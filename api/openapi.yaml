          type: number
        inbound_scan_review_threshold:
          format: double
          type: number
        name:
          type: string
        outbound_allowlist:
          items:
            type: string
          type: array
        outbound_policy:
          enum:
            - open
            - allowlist
            - domain
          type: string
        outbound_policy_action:
          enum:
            - flag
            - review
            - block
          type: string
        outbound_scan:
          enum:
            - "off"
            - "on"
          type: string
        outbound_scan_block_threshold:
          format: double
          type: number
        outbound_scan_review_threshold:
          format: double
          type: number
