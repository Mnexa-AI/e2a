        - explode: false
          in: query
          name: conversation_id
          schema:
            type: string
        - explode: false
          in: query
          name: message_id
          schema:
            type: string
        - description: RFC3339.
          explode: false
          in: query
          name: since
          schema:
            description: RFC3339.
            type: string
        - description: RFC3339.
          explode: false
          in: query
          name: until
          schema:
            description: RFC3339.
            type: string
        - explode: false
          in: query
          name: cursor
          schema:
