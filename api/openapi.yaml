components:
  headers:
    RateLimitLimit:
      description: Request quota for the current limiter window.
      schema:
        type: integer
    RateLimitRemaining:
      description: Requests remaining in the current limiter window.
      schema:
        type: integer
    RateLimitReset:
      description: Seconds until the current limiter window resets.
      schema:
        type: integer
    RetryAfter:
      description: Positive integer seconds to wait before retrying a transient 429 or 503 response.
      schema:
        minimum: 1
        type: integer
    XRequestID:
      description: Always-present request correlation id. Error responses echo the same value in error.request_id.
      schema:
        type: string
  schemas:
    APIKeyExportEntry:
      additionalProperties: true
      properties:
        created_at:
          format: date-time
          type: string
        id:
          type: string
        key_prefix:
          type: string
        last_used_at:
          format: date-time
          type: string
        name:
          type: string
        revoked_at:
          format: date-time
          type: string
      required:
        - id
        - name
        - key_prefix
        - created_at
      type: object
    APIKeyView:
      additionalProperties: true
      properties:
        agent_email:
          description: Bound inbox email for agent-scoped keys; omitted for account scope.
          type: string
        created_at:
          format: date-time
          type: string
        expires_at:
          format: date-time
          type: string
        id:
          type: string
        key_prefix:
          description: Non-secret visible prefix (e.g. e2a_acct_… / e2a_agt_…).
          type: string
        last_used_at:
          format: date-time
          type: string
        name:
          type: string
        scope:
          description: "account = workspace admin; agent = bound to one inbox. Open set: new values may be added over time, so treat these as strings and tolerate unknown values. Known values: account, agent."
          type: string
      required:
        - id
        - name
        - key_prefix
        - scope
        - created_at
      type: object
    AccountUserView:
      additionalProperties: true
      properties:
        email:
          type: string
        id:
          type: string
      required:
        - id
        - email
      type: object
    AccountView:
      additionalProperties: true
      properties:
        agent_email:
          type: string
        limits:
          $ref: "#/components/schemas/LimitsCapsView"
        plan_code:
          type: string
        scope:
          description: "Credential scope. Open set: new values may be added over time, so treat these as strings and tolerate unknown values. Known values: account, agent."
          type: string
        upgrade_url:
          type: string
        usage:
          $ref: "#/components/schemas/LimitsUsageView"
        user:
          $ref: "#/components/schemas/AccountUserView"
      required:
        - user
        - scope
        - plan_code
        - limits
        - usage
        - upgrade_url
      type: object
    AgentIdentity:
      additionalProperties: true
      properties:
        created_at:
          format: date-time
          type: string
        deleted_at:
          format: date-time
          type: string
        domain:
          type: string
        domain_verified:
          type: boolean
        email:
          type: string
        inbound_7d:
          format: int64
          type: integer
        inbound_allowlist:
          items:
            type: string
          type:
            - array
            - "null"
        inbound_policy:
          type: string
        inbound_policy_action:
          type: string
        inbound_scan:
          type: string
        inbound_scan_block_threshold:
          format: double
          type: number
        inbound_scan_review_threshold:
          format: double
          type: number
        inbound_scan_sensitivity:
          type: string
        last_delivery_at:
          format: date-time
          type: string
        name:
          type: string
        on_expiry:
          type: string
        outbound_7d:
          format: int64
          type: integer
        outbound_allowlist:
          items:
            type: string
          type:
            - array
            - "null"
        outbound_policy:
          type: string
        outbound_policy_action:
          type: string
        outbound_scan:
          type: string
        outbound_scan_block_threshold:
          format: double
          type: number
        outbound_scan_review_threshold:
          format: double
          type: number
        outbound_scan_sensitivity:
          type: string
        pending_count:
          format: int64
          type: integer
        public:
          type: boolean
        suppress_notifications:
          type: boolean
        ttl_seconds:
          format: int64
          type: integer
        user_id:
          type: string
        webhook_status:
          description: "Webhook posture for this agent, derived from the account's webhook subscribers that match it (a webhook with no agent filter matches every agent). Open set; tolerate unknown values. Known values: none (no webhook matches this agent), healthy (an enabled webhook matches and none serving this agent has a terminally-failed delivery in the last 24h), failing (an enabled webhook matches but at least one delivery on a matching enabled webhook terminally failed in the last 24h), disabled (webhooks match but every one is disabled, turned off manually), auto_disabled (webhooks match, every one is disabled, and at least one was auto-disabled by the chronic-failure sweep). Present on enriched surfaces (account export, dashboard agent list); absent where not computed."
          type: string
      required:
        - domain
        - email
        - name
        - domain_verified
        - public
        - created_at
        - user_id
        - ttl_seconds
        - on_expiry
        - suppress_notifications
        - inbound_7d
        - outbound_7d
        - pending_count
        - inbound_policy
        - inbound_policy_action
        - outbound_policy
        - outbound_policy_action
        - inbound_scan
        - inbound_scan_review_threshold
        - inbound_scan_block_threshold
        - outbound_scan
        - outbound_scan_review_threshold
        - outbound_scan_block_threshold
        - inbound_scan_sensitivity
        - outbound_scan_sensitivity
      type: object
    AgentView:
      additionalProperties: true
      properties:
        created_at:
          format: date-time
          type: string
        deleted_at:
          description: When the agent was moved to the trash. Omitted for live agents.
          format: date-time
          type: string
        domain:
          type: string
        domain_verified:
          type: boolean
        email:
          type: string
        name:
          type: string
      required:
        - domain
        - email
        - name
        - domain_verified
        - created_at
      type: object
    ApproveRequest:
      additionalProperties: false
      properties:
        attachments:
          items:
            $ref: "#/components/schemas/Attachment"
          type: array
        bcc:
          description: Override Bcc recipients. The message is limited to 50 recipients across to, cc, and bcc combined.
          items:
            type: string
          type: array
        cc:
          description: Override Cc recipients. The message is limited to 50 recipients across to, cc, and bcc combined.
          items:
            type: string
          type: array
        html:
          maxLength: 1048576
          type: string
        subject:
          maxLength: 2000
          type: string
        text:
          maxLength: 1048576
          type: string
        to:
          description: Override primary recipients. The message is limited to 50 recipients across to, cc, and bcc combined.
          items:
            type: string
          type: array
      type: object
    Attachment:
      additionalProperties: false
      properties:
        content_type:
          examples:
            - application/pdf
          type: string
        data:
          description: Base64-encoded file content. Each attachment must be ≤ 10 MB decoded; a message may carry at most 10 attachments totaling ≤ 25 MB decoded.
          examples:
            - base64-encoded-content
          type: string
        filename:
          examples:
            - report.pdf
          type: string
      required:
        - filename
        - content_type
        - data
      type: object
    AttachmentMeta:
      additionalProperties: true
      properties:
        content_type:
          type: string
        filename:
          type: string
        index:
          description: Stable 0-based attachment index (document order) — the fetch key for the attachment-bytes endpoint.
          format: int64
          type: integer
        size_bytes:
          description: DECODED attachment payload size in bytes (Content-Transfer-Encoding undone) — the size of the file a download yields, not its encoded size inside the raw MIME.
          format: int64
          type: integer
      required:
        - size_bytes
        - index
      type: object
    AttachmentMetaView:
      additionalProperties: true
      properties:
        content_type:
          type: string
        filename:
          type: string
        index:
          format: int64
          type: integer
        size_bytes:
          description: DECODED attachment payload size in bytes (Content-Transfer-Encoding undone) — the size of the file a download yields, not its encoded size inside the raw MIME.
          format: int64
          type: integer
      required:
        - index
        - size_bytes
      type: object
    AttachmentView:
      additionalProperties: true
      properties:
        content_type:
          type: string
        data:
          type: string
        download_url:
          type: string
        expires_at:
          format: date-time
          type: string
        filename:
          type: string
        index:
          format: int64
          type: integer
        size_bytes:
          description: DECODED attachment payload size in bytes (Content-Transfer-Encoding undone) — exactly what download_url serves and what the 256 KB inline cap is checked against; not the encoded size inside the raw MIME.
          format: int64
          type: integer
      required:
        - index
        - size_bytes
        - download_url
        - expires_at
      type: object
    AuthVerdict:
      additionalProperties: true
      properties:
        dkim:
          $ref: "#/components/schemas/CheckResult"
        dmarc:
          $ref: "#/components/schemas/CheckResult"
        spf:
          $ref: "#/components/schemas/CheckResult"
      required:
        - spf
        - dkim
        - dmarc
      type: object
    CheckResult:
      additionalProperties: true
      properties:
        detail:
          type: string
        status:
          type: string
      required:
        - status
      type: object
    ConversationDetailView:
      additionalProperties: true
      properties:
        first_message_at:
          format: date-time
          type: string
        has_unread:
          type: boolean
        id:
          type: string
        inbound_count:
          format: int64
          type: integer
        labels:
          items:
            type: string
          type: array
        last_message_at:
          format: date-time
          type: string
        latest_from:
          type: string
        latest_subject:
          type: string
        message_count:
          format: int64
          type: integer
        messages:
          items:
            $ref: "#/components/schemas/MessageSummaryView"
          type: array
        outbound_count:
          format: int64
          type: integer
        participants:
          items:
            type: string
          type: array
      required:
        - participants
        - labels
        - messages
        - id
        - last_message_at
        - first_message_at
        - message_count
        - inbound_count
        - outbound_count
        - has_unread
        - latest_subject
        - latest_from
      type: object
    ConversationSummaryView:
      additionalProperties: true
      properties:
        first_message_at:
          format: date-time
          type: string
        has_unread:
          type: boolean
        id:
          type: string
        inbound_count:
          format: int64
          type: integer
        last_message_at:
          format: date-time
          type: string
        latest_from:
          type: string
        latest_subject:
          type: string
        message_count:
          format: int64
          type: integer
        outbound_count:
          format: int64
          type: integer
      required:
        - id
        - last_message_at
        - first_message_at
        - message_count
        - inbound_count
        - outbound_count
        - has_unread
        - latest_subject
        - latest_from
      type: object
    CreateAPIKeyRequest:
      additionalProperties: false
      properties:
        agent_email:
          description: Inbox email to bind the key to; required when scope=agent.
          type: string
        expires_at:
          description: Optional hard expiry (RFC 3339, must be in the future). Omit for a never-expiring key.
          format: date-time
          type: string
        name:
          description: Human label for the key.
          type: string
        scope:
          description: account = workspace admin (default); agent = bound to a single inbox.
          enum:
            - account
            - agent
          type: string
      type: object
    CreateAPIKeyResponse:
      additionalProperties: true
      properties:
        agent_email:
          description: Bound inbox email for agent-scoped keys; omitted for account scope.
          type: string
        created_at:
          format: date-time
          type: string
        expires_at:
          format: date-time
          type: string
        id:
          type: string
        key:
          description: The secret key. Shown once; store it now — it cannot be retrieved later.
          type: string
        key_prefix:
          description: Non-secret visible prefix (e.g. e2a_acct_… / e2a_agt_…).
          type: string
        last_used_at:
          format: date-time
          type: string
        name:
          type: string
        scope:
          description: "account = workspace admin; agent = bound to one inbox. Open set: new values may be added over time, so treat these as strings and tolerate unknown values. Known values: account, agent."
          type: string
      required:
        - key
        - id
        - name
        - key_prefix
        - scope
        - created_at
      type: object
    CreateAgentRequest:
      additionalProperties: false
      properties:
        email:
          type: string
        name:
          type: string
      required:
        - email
      type: object
    CreateTemplateRequest:
      additionalProperties: false
      properties:
        alias:
          description: Optional per-user unique handle ([A-Za-z][A-Za-z0-9._-]{0,127}) usable as template_alias on send.
          type: string
        from_starter:
          description: "Copy a starter template (by alias, see GET /v1/starter-templates) verbatim into your library. Mutually exclusive with subject, text and html — the copy is verbatim; edit the created template afterwards. name and alias default to the starter's and may be overridden. Beta: templates are unstable — their shape may change before they are declared stable."
          type: string
        html:
          description: Optional HTML body template source ({{x}} is HTML-escaped, {{{x}}} is raw).
          type: string
        name:
          description: Human-readable template name. Required unless from_starter supplies the default.
          type: string
        subject:
          description: Subject template source ({{variable}} interpolation, no HTML escaping). Required unless from_starter is set.
          type: string
        text:
          description: Plain-text body template source (no HTML escaping). Required unless from_starter is set.
          type: string
      type: object
      x-stability-level: beta
    CreateWebhookRequest:
      additionalProperties: false
      properties:
        description:
          type: string
        events:
          description: "Beta: the screening + review-hold events (email.flagged, email.blocked, email.review_requested, email.review_approved, email.review_rejected) are unstable — their payload may change before they are declared stable. All other events are stable."
          items:
            enum:
              - email.received
              - email.sent
              - email.failed
              - email.review_approved
              - email.review_rejected
              - domain.sending_verified
              - domain.sending_failed
              - email.delivered
              - email.bounced
              - email.complained
              - domain.suppression_added
              - email.flagged
              - email.blocked
              - email.review_requested
            type: string
          type: array
          x-experimental-values:
            - email.flagged
            - email.blocked
            - email.review_requested
            - email.review_approved
            - email.review_rejected
        filters:
          $ref: "#/components/schemas/WebhookFiltersRequest"
        url:
          description: Required, non-empty webhook delivery URL.
          type: string
      required:
        - url
        - events
      type: object
    CreateWebhookResponse:
      additionalProperties: true
      properties:
        auto_disabled_at:
          format: date-time
          type: string
        created_at:
          format: date-time
          type: string
        description:
          type: string
        enabled:
          type: boolean
        events:
          description: "The event types this webhook matches. Open set: new event types may be added over time, so treat these as strings and tolerate unknown values. Known values: email.received, email.sent, email.failed, email.delivered, email.bounced, email.complained, email.flagged, email.blocked, email.review_requested, email.review_approved, email.review_rejected, domain.sending_verified, domain.sending_failed, domain.suppression_added. Beta: the screening + review-hold events (email.flagged, email.blocked, email.review_requested, email.review_approved, email.review_rejected) are unstable — their payload may change before they are declared stable."
          items:
            type: string
          type: array
          x-experimental-values:
            - email.flagged
            - email.blocked
            - email.review_requested
            - email.review_approved
            - email.review_rejected
        filters:
          $ref: "#/components/schemas/WebhookFiltersView"
        id:
          type: string
        last_delivered_at:
          format: date-time
          type: string
        signing_secret:
          type: string
        url:
          type: string
      required:
        - signing_secret
        - id
        - url
        - description
        - events
        - filters
        - enabled
        - created_at
      type: object
    DNSRecord:
      additionalProperties: true
      properties:
        name:
          description: Record name (host). The apex domain for ownership/inbound_mx; an FQDN for dkim/mail_from records.
          type: string
        priority:
          description: MX priority. Null for non-MX records.
          format: int64
          type:
            - integer
            - "null"
        purpose:
          description: "What the record is for. Open set; tolerate unknown values. Known values: ownership, inbound_mx, dkim, mail_from_mx, mail_from_spf."
          type: string
        status:
          description: "Per-record verification state. Open set; tolerate unknown values. Known values: verified, pending, missing, failed. Inbound records (ownership, inbound_mx) become verified once inbound verification passes, which requires BOTH the ownership TXT and the inbound MX. Sending records reflect their own SES axis: the dkim record follows the DKIM axis, while mail_from_mx and mail_from_spf follow the custom MAIL FROM axis, so a domain with working DKIM but a broken MAIL FROM (or the reverse) shows exactly which record to fix rather than failing all three. Before SES has reported a per-axis result (pre-provision rows) the sending records fall back to the all-or-nothing sending_status rollup; consult sending_error for the failure reason. The domain-level sending_status field remains the all-or-nothing rollup summary."
          type: string
        type:
          description: DNS record type. MX or TXT.
          type: string
        value:
          description: Record value. For MX records this is the mail-server host only; the priority is in the priority field.
          type: string
      required:
        - type
        - name
        - value
        - priority
        - purpose
        - status
      type: object
    DeleteAgentResult:
      additionalProperties: true
      properties:
        deleted:
          description: Always true — the agent is no longer active. A failed delete is an error envelope, never deleted:false.
          type: boolean
        email:
          description: Email address of the deleted agent.
          type: string
        messages_deleted:
          description: Number of messages permanently removed by the cascade; zero when the agent is moved to trash.
          format: int64
          type: integer
      required:
        - deleted
        - email
        - messages_deleted
      type: object
    DeleteApiKeyResult:
      additionalProperties: true
      properties:
        deleted:
          description: Always true — the key is revoked. A failed delete is an error envelope, never deleted:false.
          type: boolean
        id:
          description: ID of the revoked API key.
          type: string
      required:
        - deleted
        - id
      type: object
    DeleteDomainResult:
      additionalProperties: true
      properties:
        deleted:
          description: Always true — the domain no longer exists. A failed delete is an error envelope, never deleted:false.
          type: boolean
        domain:
          description: The deleted domain.
          type: string
      required:
        - deleted
        - domain
      type: object
    DeleteMessageResult:
      additionalProperties: true
      properties:
        deleted:
          description: Always true — the message is deleted (moved to trash or purged). A failed delete is an error envelope, never deleted:false.
          type: boolean
        id:
          description: ID of the deleted message.
          type: string
      required:
        - deleted
        - id
      type: object
      x-stability-level: beta
    DeleteSuppressionResult:
      additionalProperties: true
      properties:
        address:
          description: The un-suppressed recipient address.
          type: string
        deleted:
          description: Always true — the address is no longer suppressed. A failed delete is an error envelope, never deleted:false.
          type: boolean
      required:
        - deleted
        - address
      type: object
    DeleteTemplateResult:
      additionalProperties: true
      properties:
        deleted:
          description: Always true — the template no longer exists. A failed delete is an error envelope, never deleted:false.
          type: boolean
        id:
          description: ID of the deleted template.
          type: string
      required:
        - deleted
        - id
      type: object
      x-stability-level: beta
    DeleteUserDataResult:
      additionalProperties: true
      properties:
        agents_deleted:
          format: int64
          type: integer
        api_keys_deleted:
          format: int64
          type: integer
        deleted:
          description: Always true — the account no longer exists. A failed delete is an error envelope, never deleted:false.
          type: boolean
        domains_deleted:
          format: int64
          type: integer
        messages_deleted:
          format: int64
          type: integer
        oauth_access_tokens_deleted:
          format: int64
          type: integer
        oauth_auth_codes_deleted:
          format: int64
          type: integer
        oauth_refresh_tokens_deleted:
          format: int64
          type: integer
        sessions_deleted:
          format: int64
          type: integer
        usage_events_deleted:
          format: int64
          type: integer
        usage_summaries_deleted:
          format: int64
          type: integer
        user_deleted:
          type: boolean
      required:
        - deleted
        - usage_events_deleted
        - usage_summaries_deleted
        - messages_deleted
        - agents_deleted
        - domains_deleted
        - api_keys_deleted
        - sessions_deleted
        - user_deleted
      type: object
    DeleteWebhookResult:
      additionalProperties: true
      properties:
        deleted:
          description: Always true — the webhook no longer exists. A failed delete is an error envelope, never deleted:false.
          type: boolean
        id:
          description: ID of the deleted webhook.
          type: string
      required:
        - deleted
        - id
      type: object
    DeliveryStatusJSON:
      additionalProperties: true
      properties:
        delivered:
          format: int64
          type: integer
        failed:
          format: int64
          type: integer
        matched_webhooks:
          format: int64
          type: integer
        pending:
          format: int64
          type: integer
      required:
        - matched_webhooks
        - delivered
        - pending
        - failed
      type: object
    DeploymentInfoView:
      additionalProperties: true
      properties:
        public_url:
          type: string
        shared_domain:
          type: string
        slug_registration_enabled:
          type: boolean
        version:
          type: string
      required:
        - version
        - shared_domain
        - slug_registration_enabled
      type: object
    Domain:
      additionalProperties: true
      properties:
        agent_count:
          format: int64
          type: integer
        created_at:
          format: date-time
          type: string
        dkim_public_key:
          type: string
        dkim_selector:
          type: string
        domain:
          type: string
        last_checked_at:
          format: date-time
          type: string
        primary:
          type: boolean
        sending_error:
          type: string
        sending_last_checked_at:
          format: date-time
          type: string
        sending_status:
          type: string
        user_id:
          type: string
        verification_token:
          type: string
        verified:
          type: boolean
        verified_at:
          format: date-time
          type: string
      required:
        - domain
        - verified
        - verification_token
        - created_at
        - primary
        - agent_count
        - sending_status
      type: object
    DomainSendingFailedData:
      additionalProperties: true
      properties:
        domain:
          type: string
        reason:
          type: string
        sending_status:
          description: "Terminal sending-identity status. Open set; tolerate unknown values. Known values: failed."
          type: string
      required:
        - domain
        - sending_status
      type: object
    DomainSendingVerifiedData:
      additionalProperties: true
      properties:
        domain:
          type: string
        sending_status:
          description: "Terminal sending-identity status. Open set; tolerate unknown values. Known values: verified."
          type: string
      required:
        - domain
        - sending_status
      type: object
    DomainSuppressionAddedData:
      additionalProperties: true
      properties:
        address:
          type: string
        message_id:
          type: string
        reason:
          type: string
        source:
          description: "How the suppression was created. Open set: new values may be added over time, so treat these as strings and tolerate unknown values. Known values: bounce, complaint."
          type: string
      required:
        - address
        - source
      type: object
    DomainView:
      additionalProperties: true
      properties:
        agent_count:
          format: int64
          type: integer
        created_at:
          format: date-time
          type: string
        dns_records:
          items:
            $ref: "#/components/schemas/DNSRecord"
          type: array
        domain:
          type: string
        last_checked_at:
          format: date-time
          type: string
