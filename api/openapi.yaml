            type: string
        - description: "Optional bounded wait. wait=sent holds the request until the asynchronously delivered message reaches a terminal-or-held state or 20 seconds elapse, then returns the observed state; on timeout returns status=accepted. Default: no wait. Always branch on body.status, not the HTTP code."
          explode: false
          in: query
          name: wait
          schema:
            description: "Optional bounded wait. wait=sent holds the request until the asynchronously delivered message reaches a terminal-or-held state or 20 seconds elapse, then returns the observed state; on timeout returns status=accepted. Default: no wait. Always branch on body.status, not the HTTP code."
