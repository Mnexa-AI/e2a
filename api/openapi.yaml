            - "null"
      required:
        - suppressions
      type: object
    TestWebhookOutputBody:
      additionalProperties: false
      properties:
        delivery_id:
          type: string
      required:
        - delivery_id
      type: object
    TestWebhookRequest:
      additionalProperties: false
      properties:
        data:
          additionalProperties: {}
          type: object
        event:
          type: string
      type: object
    UpdateAgentRequest:
      additionalProperties: false
      properties:
        hitl_enabled:
          type: boolean
        hitl_expiration_action:
          type: string
        hitl_ttl_seconds:
          format: int64
          type: integer
      type: object
    UpdateDomainRequest:
      additionalProperties: false
      properties:
        is_primary:
          type: boolean
      type: object
    UpdateWebhookRequest:
      additionalProperties: false
      properties:
        description:
          type: string
        enabled:
          type: boolean
        events:
          items:
            type: string
          type: array
        filters:
          $ref: "#/components/schemas/WebhookFiltersView"
        url:
          type: string
      type: object
    UsageEventEntry:
      additionalProperties: false
      properties:
        agent_id:
          type: string
        created_at:
          format: date-time
          type: string
        direction:
          type: string
        domain:
          type: string
        event_type:
          type: string
        id:
          type: string
      required:
        - id
        - agent_id
        - domain
        - direction
        - event_type
        - created_at
      type: object
    UserExport:
      additionalProperties: false
      properties:
        agents:
          items:
            $ref: "#/components/schemas/AgentIdentity"
          type:
            - array
            - "null"
        api_keys:
          items:
            $ref: "#/components/schemas/APIKeyExportEntry"
          type:
            - array
            - "null"
        domains:
          items:
            $ref: "#/components/schemas/Domain"
          type:
            - array
            - "null"
        generated_at:
          format: date-time
          type: string
        messages:
          items:
            $ref: "#/components/schemas/Message"
          type:
            - array
            - "null"
        oauth_connections:
          items:
            $ref: "#/components/schemas/OAuthConnectionEntry"
          type:
            - array
            - "null"
        schema_version:
          type: string
        usage_events:
          items:
            $ref: "#/components/schemas/UsageEventEntry"
          type:
            - array
            - "null"
        user:
          $ref: "#/components/schemas/UserExportUser"
      required:
        - generated_at
        - schema_version
        - user
        - domains
        - agents
        - api_keys
        - messages
      type: object
    UserExportUser:
      additionalProperties: false
      properties:
        created_at:
          format: date-time
          type: string
        email:
          type: string
        id:
          type: string
        name:
          type: string
      required:
        - id
        - email
        - name
        - created_at
      type: object
    VerifyDomainView:
      additionalProperties: false
      properties:
        dkim:
          type: string
        domain:
          type: string
        mx:
          type: string
        spf:
          type: string
        verified:
          type: boolean
        verified_at:
          format: date-time
          type: string
      required:
        - domain
        - verified
      type: object
    WebhookDeliveryView:
      additionalProperties: false
      properties:
        attempts:
          format: int64
          type: integer
        created_at:
          type: string
        event_type:
          type: string
        id:
          type: string
        last_attempt_at:
          type: string
        last_error:
          type: string
        last_status_code:
          format: int64
          type: integer
        next_retry_at:
          type: string
        status:
          type: string
      required:
        - id
        - event_type
        - status
        - attempts
        - next_retry_at
        - created_at
      type: object
    WebhookFiltersView:
      additionalProperties: false
      properties:
        agent_ids:
          items:
            type: string
          type:
            - array
            - "null"
        conversation_ids:
          items:
            type: string
          type:
            - array
            - "null"
        labels:
          items:
            type: string
          type:
            - array
            - "null"
      type: object
    WebhookView:
      additionalProperties: false
      properties:
        auto_disabled_at:
          type: string
        created_at:
          type: string
        description:
          type: string
        enabled:
          type: boolean
        events:
          items:
            type: string
          type:
            - array
            - "null"
        filters:
          $ref: "#/components/schemas/WebhookFiltersView"
        id:
          type: string
        last_delivered_at:
          type: string
        previous_secret_expires_at:
          type: string
        signing_secret:
          type: string
        url:
          type: string
      required:
        - id
        - url
        - description
        - events
        - filters
        - enabled
        - created_at
      type: object
  securitySchemes:
    bearer:
      description: "API key (e2a_…) or OAuth 2.1 access token, sent as `Authorization: Bearer <token>`."
      scheme: bearer
      type: http
info:
  description: e2a — authenticated email gateway for AI agents. v1 contract.
  title: e2a API
  version: 1.0.0
openapi: 3.1.0
paths:
  /v1/account:
    delete:
      description: Permanently deletes the account and cascades all owned data. Requires ?confirm=DELETE.
      operationId: deleteAccount
      parameters:
        - description: Must be DELETE — this is irreversible.
          explode: false
          in: query
          name: confirm
          schema:
            description: Must be DELETE — this is irreversible.
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteUserDataResult"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
          description: Error
      security:
        - bearer: []
      summary: Delete your account + all data (irreversible)
      tags:
        - account
    get:
      description: The authenticated account's plan caps and current usage. (Deployment discovery — shared domain, slug registration — is the separate public GET /v1/info.)
      operationId: getAccount
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LimitsView"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
          description: Error
      security:
        - bearer: []
      summary: "Get account: plan limits + usage"
      tags:
        - account
  /v1/account/export:
    get:
      description: A JSON dump of every record the authenticated account owns.
      operationId: exportAccount
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserExport"
          description: OK
          headers:
            Content-Disposition:
              schema:
                type: string
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
          description: Error
      security:
        - bearer: []
      summary: Export your data (GDPR right-of-access)
      tags:
        - account
  /v1/account/suppressions:
    get:
      description: Addresses e2a will refuse to send to (auto-added on a hard bounce or complaint, or added manually). Sends to a suppressed address fail with recipient_suppressed.
      operationId: listSuppressions
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuppressionsOutputBody"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
          description: Error
      security:
        - bearer: []
      summary: List suppressed recipient addresses
      tags:
        - account
  /v1/account/suppressions/{address}:
    delete:
      description: Un-suppress a recipient. A previously-blocked send to it then succeeds (idempotency keys are released, so no fresh key is needed).
      operationId: deleteSuppression
      parameters:
        - in: path
          name: address
          required: true
          schema:
            type: string
      responses:
        "204":
          description: No Content
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
          description: Error
      security:
        - bearer: []
      summary: Remove an address from the suppression list
      tags:
        - account
  /v1/agents:
    get:
      description: List the agents owned by the authenticated account.
      operationId: listAgents
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAgentsOutputBody"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
          description: Error
      security:
        - bearer: []
      summary: List agents
      tags:
        - agents
    post:
      description: Register an agent on a verified domain the caller owns (or, when slug registration is enabled, on the shared domain).
      operationId: createAgent
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAgentRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAgentResponse"
          description: Created
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
          description: Error
      security:
        - bearer: []
      summary: Create an agent
      tags:
        - agents
  /v1/agents/{address}:
    delete:
      description: Delete an agent the caller owns.
      operationId: deleteAgent
      parameters:
        - description: The agent's full email address, e.g. support@acme.com.
          in: path
          name: address
          required: true
          schema:
            description: The agent's full email address, e.g. support@acme.com.
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteAgentOutputBody"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
          description: Error
      security:
        - bearer: []
      summary: Delete an agent
      tags:
        - agents
    get:
      description: Fetch a single agent the authenticated account owns, by full email address.
      operationId: getAgent
      parameters:
        - description: The agent's full email address, e.g. support@acme.com.
          in: path
          name: address
          required: true
          schema:
            description: The agent's full email address, e.g. support@acme.com.
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentView"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
          description: Error
      security:
        - bearer: []
      summary: Get an agent
      tags:
        - agents
    patch:
      description: Patch an agent's HITL settings. Returns the post-update agent.
      operationId: updateAgent
      parameters:
        - in: path
          name: address
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAgentRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentView"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
          description: Error
      security:
        - bearer: []
      summary: Update an agent
      tags:
        - agents
  /v1/agents/{address}/conversations:
    get:
      description: List an agent's conversation threads (derived from messages.conversation_id).
      operationId: listConversations
      parameters:
        - in: path
          name: address
          required: true
          schema:
            type: string
        - description: RFC3339.
          explode: false
          in: query
          name: since
          schema:
            description: RFC3339.
            type: string
        - description: RFC3339.
          explode: false
          in: query
          name: until
          schema:
            description: RFC3339.
            type: string
        - explode: false
          in: query
          name: limit
          schema:
            default: 100
            format: int64
            maximum: 200
            minimum: 1
            type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PageConversationSummaryView"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
          description: Error
      security:
        - bearer: []
      summary: List conversations
      tags:
        - conversations
  /v1/agents/{address}/conversations/{id}:
    get:
      description: Fetch a single conversation thread with its participants, labels, and member messages.
      operationId: getConversation
      parameters:
        - in: path
          name: address
          required: true
          schema:
            type: string
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationDetailView"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
          description: Error
      security:
        - bearer: []
      summary: Get a conversation
      tags:
        - conversations
  /v1/agents/{address}/messages:
    get:
      description: List an agent's messages (inbound + outbound) with filters and cursor pagination. Held outbound drafts appear as status=pending_approval.
      operationId: listMessages
      parameters:
        - in: path
          name: address
          required: true
          schema:
            type: string
        - description: Defaults to inbound.
          explode: false
          in: query
          name: direction
          schema:
            description: Defaults to inbound.
            enum:
              - inbound
              - outbound
              - all
            type: string
        - description: Inbound only. Defaults to unread for inbound, all otherwise.
          explode: false
          in: query
          name: status
          schema:
            description: Inbound only. Defaults to unread for inbound, all otherwise.
            enum:
              - unread
              - read
              - all
            type: string
        - description: Defaults to desc (newest first).
          explode: false
          in: query
          name: sort
          schema:
            description: Defaults to desc (newest first).
            enum:
              - asc
              - desc
            type: string
        - description: Case-insensitive substring match on sender.
          explode: false
          in: query
          name: from
          schema:
            description: Case-insensitive substring match on sender.
            type: string
        - description: Case-insensitive substring match on subject.
          explode: false
          in: query
          name: subject_contains
          schema:
            description: Case-insensitive substring match on subject.
            type: string
        - explode: false
          in: query
          name: conversation_id
          schema:
            type: string
        - description: Repeatable; AND-matched.
          explode: false
          in: query
          name: labels
          schema:
            description: Repeatable; AND-matched.
            items:
              type: string
            type:
              - array
              - "null"
        - description: RFC3339; created_at >= since.
          explode: false
          in: query
          name: since
          schema:
            description: RFC3339; created_at >= since.
            type: string
        - description: RFC3339; created_at < until.
          explode: false
          in: query
          name: until
          schema:
            description: RFC3339; created_at < until.
            type: string
        - explode: false
          in: query
          name: cursor
          schema:
            type: string
        - explode: false
          in: query
          name: limit
          schema:
            default: 50
            format: int64
            maximum: 100
            minimum: 1
            type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PageMessageSummaryView"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
          description: Error
      security:
        - bearer: []
      summary: List messages
      tags:
        - messages
    post:
      description: Send a new email from the agent named in the path (a new thread). The sender is the path agent — `reply`/`forward` are their own sub-resources. 202 + pending_approval when the agent has HITL enabled. Honors Idempotency-Key.
      operationId: sendMessage
      parameters:
        - in: path
          name: address
          required: true
          schema:
            type: string
        - in: header
          name: Idempotency-Key
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendEmailRequest"
          application/octet-stream:
            schema:
              contentMediaType: application/octet-stream
              format: binary
              type: string
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendResultView"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
          description: Error
      security:
        - bearer: []
      summary: Send a new email
      tags:
        - messages
  /v1/agents/{address}/messages/{id}:
    get:
      description: Fetch a single message (inbound or outbound) by id, scoped to an agent the caller owns. Includes the raw message and inbound auth headers.
      operationId: getMessage
      parameters:
        - description: The agent's full email address.
          in: path
          name: address
          required: true
          schema:
            description: The agent's full email address.
            type: string
        - description: The message id, e.g. msg_abc123.
          in: path
          name: id
          required: true
          schema:
            description: The message id, e.g. msg_abc123.
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageView"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
          description: Error
      security:
        - bearer: []
      summary: Get a message
      tags:
        - messages
  /v1/agents/{address}/messages/{id}/approve:
    post:
      description: Approve a pending_approval draft (with optional reviewer overrides) and send it. Honors Idempotency-Key (the approve triggers an SES send).
      operationId: approveMessage
      parameters:
        - in: path
          name: address
          required: true
          schema:
            type: string
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: header
          name: Idempotency-Key
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApproveRequest"
          application/octet-stream:
            schema:
              contentMediaType: application/octet-stream
              format: binary
              type: string
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApproveResultView"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
          description: Error
      security:
        - bearer: []
      summary: Approve a held message
      tags:
        - messages
  /v1/agents/{address}/messages/{id}/forward:
    post:
      description: Forward an inbound message to new recipients; the original is quoted. 202 when held for HITL.
      operationId: forwardMessage
      parameters:
        - in: path
          name: address
          required: true
          schema:
            type: string
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: header
          name: Idempotency-Key
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForwardRequest"
          application/octet-stream:
            schema:
              contentMediaType: application/octet-stream
              format: binary
              type: string
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendResultView"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
          description: Error
      security:
        - bearer: []
      summary: Forward a message
      tags:
        - messages
  /v1/agents/{address}/messages/{id}/reject:
    post:
      description: Reject a pending_approval draft so it is never sent.
      operationId: rejectMessage
      parameters:
        - in: path
          name: address
          required: true
          schema:
            type: string
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RejectInputBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RejectResultView"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
          description: Error
      security:
        - bearer: []
      summary: Reject a held message
      tags:
        - messages
  /v1/agents/{address}/messages/{id}/reply:
    post:
      description: Reply to an inbound message; recipients/threading are derived from the original. 202 when held for HITL.
      operationId: replyToMessage
      parameters:
        - in: path
          name: address
          required: true
          schema:
            type: string
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: header
          name: Idempotency-Key
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReplyRequest"
          application/octet-stream:
            schema:
              contentMediaType: application/octet-stream
              format: binary
              type: string
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendResultView"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
          description: Error
      security:
        - bearer: []
      summary: Reply to a message
      tags:
        - messages
  /v1/agents/{address}/test:
    post:
      description: Send a platform test email to the agent's own address to confirm inbound delivery. 202 when held for HITL.
      operationId: testAgent
      parameters:
        - description: The agent's full email address, e.g. support@acme.com.
          in: path
          name: address
          required: true
          schema:
            description: The agent's full email address, e.g. support@acme.com.
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendResultView"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
          description: Error
      security:
        - bearer: []
      summary: Send a test email to the agent's own address
      tags:
        - agents
  /v1/domains:
    get:
      operationId: listDomains
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListDomainsOutputBody"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
          description: Error
      security:
        - bearer: []
      summary: List domains
      tags:
        - domains
    post:
      operationId: registerDomain
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterDomainRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DomainView"
          description: Created
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
          description: Error
      security:
        - bearer: []
      summary: Register a domain
      tags:
        - domains
  /v1/domains/{domain}:
    delete:
      operationId: deleteDomain
      parameters:
        - in: path
          name: domain
          required: true
          schema:
