  /v1/agents/{email}/messages:
    get:
      description: List an agent's messages (inbound + outbound) with filters and cursor pagination. Held outbound drafts appear as status=pending_approval.
      operationId: listMessages
      parameters:
        - in: path
          name: email
          required: true
          schema:
            type: string
        - description: Defaults to inbound.
          explode: false
          in: query
          name: direction
          schema:
            description: Defaults to inbound.
            enum:
              - inbound
              - outbound
              - all
            type: string
        - description: Inbound only. Filters by inbox read-state (MSG-1). Defaults to unread for inbound, all otherwise.
          explode: false
          in: query
          name: read_status
          schema:
            description: Inbound only. Filters by inbox read-state (MSG-1). Defaults to unread for inbound, all otherwise.
            enum:
              - unread
              - read
              - all
            type: string
        - description: Defaults to desc (newest first).
          explode: false
          in: query
          name: sort
          schema:
            description: Defaults to desc (newest first).
            enum:
              - asc
              - desc
            type: string
        - description: Case-insensitive substring match on sender.
          explode: false
          in: query
          name: from
          schema:
            description: Case-insensitive substring match on sender.
            type: string
        - description: Case-insensitive substring match on subject.
          explode: false
          in: query
          name: subject_contains
          schema:
            description: Case-insensitive substring match on subject.
            type: string
        - explode: false
          in: query
          name: conversation_id
          schema:
            type: string
        - description: Repeatable; AND-matched.
          explode: false
          in: query
          name: labels
          schema:
            description: Repeatable; AND-matched.
            items:
              type: string
            type:
              - array
              - "null"
        - description: RFC3339; created_at >= since.
          explode: false
          in: query
          name: since
          schema:
            description: RFC3339; created_at >= since.
            type: string
        - description: RFC3339; created_at < until.
          explode: false
          in: query
          name: until
          schema:
            description: RFC3339; created_at < until.
            type: string
        - explode: false
          in: query
          name: cursor
          schema:
            type: string
        - explode: false
          in: query
          name: limit
          schema:
            default: 50
            format: int64
            maximum: 100
            minimum: 1
            type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PageMessageSummaryView"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
          description: Error
      security:
        - bearer: []
      summary: List messages
      tags:
        - messages
    post:
      description: Send a new email from the agent named in the path (a new thread). The sender is the path agent — `reply`/`forward` are their own sub-resources. 202 + pending_approval when the agent has HITL enabled. Honors Idempotency-Key.
      operationId: sendMessage
      parameters:
        - in: path
          name: email
          required: true
          schema:
            type: string
        - in: header
          name: Idempotency-Key
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendEmailRequest"
          application/octet-stream:
            schema:
              contentMediaType: application/octet-stream
              format: binary
              type: string
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendResultView"
          description: OK
        "202":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendResultView"
          description: Accepted — held for human approval (status=pending_approval).
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
          description: Error — the standard envelope; branch on error.code.
      security:
        - bearer: []
