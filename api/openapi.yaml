        from_starter_alias:
          description: "The starter template this was copied from (read-only, set by from_starter creates). Beta: templates are unstable — their shape may change before they are declared stable."
          type: string
        from_starter_version:
          description: "The starter catalog version at copy time (read-only, set by from_starter creates). Beta: templates are unstable — their shape may change before they are declared stable."
          type: string
        html:
          description: The optional HTML part's template source.
          type: string
        id:
          type: string
        name:
          type: string
        subject:
          type: string
        text:
          description: The plain-text part's template source.
          type: string
        updated_at:
          format: date-time
          type: string
      required:
        - id
        - name
        - subject
        - text
        - created_at
        - updated_at
      type: object
    TestWebhookRequest:
      additionalProperties: false
      properties:
        data:
          additionalProperties: {}
          type: object
        type:
          enum:
            - email.received
            - email.sent
            - email.failed
            - email.deferred
            - email.review_approved
            - email.review_rejected
            - domain.sending_verified
            - domain.sending_failed
            - email.delivered
            - email.bounced
            - email.complained
            - domain.suppression_added
            - email.flagged
            - email.blocked
            - email.pending_review
          type: string
      type: object
    TestWebhookResponse:
      additionalProperties: false
      properties:
        delivery_id:
          type: string
      required:
        - delivery_id
      type: object
    UpdateAgentRequest:
      additionalProperties: false
      properties:
        name:
          description: New display name for the agent (a UI label; the agent's identity is its email).
          maxLength: 200
          type: string
      type: object
    UpdateMessageRequest:
      additionalProperties: false
      properties:
        add_labels:
          items:
            type: string
          type: array
        remove_labels:
          items:
            type: string
          type: array
      type: object
    UpdateMessageResultView:
      additionalProperties: false
      properties:
        labels:
          items:
            type: string
          type: array
        message_id:
          type: string
      required:
        - message_id
        - labels
      type: object
    UpdateTemplateRequest:
      additionalProperties: false
      properties:
        alias:
          description: Set to "" to clear the alias.
          type: string
        html:
          description: Set to "" to remove the HTML part.
          type: string
        name:
          type: string
        subject:
          type: string
        text:
          type: string
      type: object
    UpdateWebhookRequest:
      additionalProperties: false
      properties:
        description:
          type: string
        enabled:
          type: boolean
        events:
          description: "Beta: the screening + review-hold events (email.flagged, email.blocked, email.pending_review, email.review_approved, email.review_rejected) are unstable — their payload may change before they are declared stable. All other events are stable."
          items:
            enum:
              - email.received
              - email.sent
              - email.failed
              - email.deferred
              - email.review_approved
              - email.review_rejected
              - domain.sending_verified
              - domain.sending_failed
              - email.delivered
              - email.bounced
              - email.complained
              - domain.suppression_added
              - email.flagged
              - email.blocked
              - email.pending_review
            type: string
          type: array
        filters:
          $ref: "#/components/schemas/WebhookFiltersView"
        url:
          type: string
      type: object
    UsageEventEntry:
      additionalProperties: false
      properties:
        agent_email:
          type: string
        created_at:
          format: date-time
          type: string
        direction:
          type: string
        domain:
          type: string
        id:
          type: string
        type:
          type: string
      required:
        - id
        - agent_email
        - domain
        - direction
        - type
        - created_at
      type: object
    UserExport:
      additionalProperties: false
      properties:
        agents:
          items:
            $ref: "#/components/schemas/AgentIdentity"
          type: array
        api_keys:
          items:
            $ref: "#/components/schemas/APIKeyExportEntry"
          type: array
        domains:
          items:
            $ref: "#/components/schemas/Domain"
          type: array
        generated_at:
          format: date-time
          type: string
        messages:
          items:
            $ref: "#/components/schemas/Message"
          type: array
        oauth_connections:
          items:
            $ref: "#/components/schemas/OAuthConnectionEntry"
          type: array
        protection_events:
          items:
            $ref: "#/components/schemas/ProtectionEventExportEntry"
          type: array
        schema_version:
          type: string
        suppressions:
          items:
            $ref: "#/components/schemas/SuppressionExportEntry"
          type: array
        usage_events:
          items:
            $ref: "#/components/schemas/UsageEventEntry"
          type: array
        user:
          $ref: "#/components/schemas/UserExportUser"
      required:
        - generated_at
        - schema_version
        - user
        - domains
        - agents
        - api_keys
        - messages
        - suppressions
        - protection_events
      type: object
    UserExportUser:
      additionalProperties: false
      properties:
        created_at:
          format: date-time
          type: string
        email:
          type: string
        id:
          type: string
        name:
          type: string
      required:
        - id
        - email
        - name
        - created_at
      type: object
    ValidateTemplateRequest:
      additionalProperties: false
      properties:
        html:
          type: string
        subject:
          type: string
        test_data:
          additionalProperties: {}
          description: Sample template_data to render the preview with. Missing variables render as empty strings.
          type: object
        text:
          type: string
      type: object
    ValidateTemplateResponse:
      additionalProperties: false
      properties:
        errors:
          items:
            $ref: "#/components/schemas/TemplatePartError"
          type: array
        rendered:
          $ref: "#/components/schemas/RenderedTemplateView"
          description: Rendered preview against test_data (or empty data). Present only when valid.
        suggested_data:
          additionalProperties: {}
          description: A placeholder value for every variable the source references — a starting point for template_data. Dot-path variables ({{user.name}}) emit NESTED objects, matching how the renderer resolves them.
          type: object
        valid:
          type: boolean
      required:
        - valid
        - errors
      type: object
    ValidationErrorDetails:
      additionalProperties: false
      properties:
        fields:
          description: The fields that failed validation. May be empty when the failure is request-wide rather than field-specific.
          items:
            $ref: "#/components/schemas/FieldError"
          type:
            - array
            - "null"
      required:
        - fields
      type: object
    VerifyDomainView:
      additionalProperties: false
      properties:
        dkim:
          description: "Live DKIM probe state. Known values: found, missing, deferred, mismatch. 'mismatch' means a DKIM record IS published at the selector but its key doesn't match the issued one — almost always a truncated/clipped TXT (the value is ~400 chars and must be published in full, ending in 'AQAB'). On 'mismatch', re-publish the complete DKIM record; do not just wait."
          type: string
        domain:
          type: string
        mx:
          type: string
        spf:
          type: string
        verified:
          type: boolean
        verified_at:
          format: date-time
          type: string
      required:
        - domain
        - verified
      type: object
    WebhookDeliveryView:
      additionalProperties: false
      properties:
        attempts:
          format: int64
          type: integer
        created_at:
          format: date-time
          type: string
        id:
          type: string
        last_attempt_at:
          format: date-time
          type: string
        last_error:
          type: string
        last_status_code:
          format: int64
          type: integer
        next_retry_at:
          format: date-time
          type: string
        status:
          description: "Delivery state. Open set; tolerate unknown values. Known values: pending, delivered, failed."
          type: string
        type:
          description: "The event type that triggered this delivery. Open set: new event types may be added, so treat as a string and tolerate unknown values. Known values are the webhook event catalog (email.received, email.sent, email.failed, email.deferred, email.delivered, …, domain.*)."
          type: string
      required:
        - id
        - type
        - status
        - attempts
        - next_retry_at
        - created_at
      type: object
    WebhookFiltersView:
      additionalProperties: false
      properties:
        agent_emails:
          items:
            type: string
          type: array
        conversation_ids:
          items:
            type: string
          type: array
        labels:
          items:
            type: string
          type: array
      type: object
    WebhookView:
      additionalProperties: false
      properties:
        auto_disabled_at:
          format: date-time
          type: string
        created_at:
          format: date-time
          type: string
        description:
          type: string
        enabled:
          type: boolean
        events:
          description: "The event types this webhook matches. Open set: new event types may be added over time, so treat these as strings and tolerate unknown values. Known values: email.received, email.sent, email.failed, email.deferred, email.delivered, email.bounced, email.complained, email.flagged, email.blocked, email.pending_review, email.review_approved, email.review_rejected, domain.sending_verified, domain.sending_failed, domain.suppression_added. Beta: the screening + review-hold events (email.flagged, email.blocked, email.pending_review, email.review_approved, email.review_rejected) are unstable — their payload may change before they are declared stable."
          items:
            type: string
          type: array
        filters:
          $ref: "#/components/schemas/WebhookFiltersView"
        id:
          type: string
        last_delivered_at:
          format: date-time
          type: string
        url:
          type: string
      required:
        - id
        - url
        - description
        - events
        - filters
        - enabled
        - created_at
      type: object
  securitySchemes:
    bearer:
      description: "API key (e2a_…) or OAuth 2.1 access token, sent as `Authorization: Bearer <token>`."
      scheme: bearer
      type: http
info:
  description: e2a — authenticated email gateway for AI agents. v1 contract.
  title: e2a API
  version: 1.0.0
openapi: 3.1.0
paths:
  /v1/account:
    delete:
      description: Permanently deletes the account and cascades all owned data. Requires ?confirm=DELETE.
      operationId: deleteAccount
      parameters:
        - description: Must be the literal DELETE — this action is irreversible.
          explode: false
          in: query
          name: confirm
          required: true
          schema:
            description: Must be the literal DELETE — this action is irreversible.
            enum:
              - DELETE
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteUserDataResult"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
          description: Error
      security:
        - bearer: []
      summary: Delete your account + all data (irreversible)
      tags:
        - account
    get:
      description: The authenticated principal's identity (user + scope; agent_email for agent-scoped credentials), plan caps, and current usage. Works for both account- and agent-scoped credentials. (Deployment discovery — shared domain, slug registration — is the separate public GET /v1/info.)
      operationId: getAccount
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountView"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
          description: Error
      security:
        - bearer: []
      summary: "Get account: identity + plan limits + usage (whoami)"
      tags:
        - account
  /v1/account/api-keys:
    get:
      description: "API keys for the account (metadata only — secrets are shown once, at creation). Account scope only: an agent-scoped credential cannot manage keys."
      operationId: listApiKeys
      parameters:
        - description: Opaque pagination cursor from a previous response's next_cursor. Continuation requests must not change the other filters.
          explode: false
          in: query
          name: cursor
          schema:
            description: Opaque pagination cursor from a previous response's next_cursor. Continuation requests must not change the other filters.
            type: string
        - description: Maximum number of items to return (1-100).
          explode: false
          in: query
          name: limit
          schema:
            default: 100
            description: Maximum number of items to return (1-100).
            format: int64
            maximum: 100
            minimum: 1
            type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PageAPIKeyView"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
          description: Error
      security:
        - bearer: []
      summary: List API keys
      tags:
        - account
    post:
      description: Mint a new API key; the plaintext key is returned once. scope=account is workspace admin (agent/domain/key management); scope=agent binds the key to one inbox so it can act only as that agent. Account scope only.
      operationId: createApiKey
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAPIKeyRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAPIKeyResponse"
          description: Created
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
          description: Error
      security:
        - bearer: []
      summary: Create an API key
      tags:
        - account
  /v1/account/api-keys/{id}:
    delete:
      description: Revoke a key by id. Integrations using it stop authenticating immediately. Account scope only. Requires ?confirm=DELETE.
      operationId: deleteApiKey
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - description: Must be the literal DELETE — this action is irreversible.
          explode: false
          in: query
          name: confirm
          required: true
          schema:
            description: Must be the literal DELETE — this action is irreversible.
            enum:
              - DELETE
            type: string
      responses:
        "204":
          description: No Content
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
          description: Error
      security:
        - bearer: []
      summary: Revoke an API key
      tags:
        - account
  /v1/account/export:
    get:
      description: A JSON dump of every record the authenticated account owns.
      operationId: exportAccount
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserExport"
          description: OK
          headers:
            Content-Disposition:
              schema:
                type: string
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
          description: Error
      security:
        - bearer: []
      summary: Export your data (GDPR right-of-access)
      tags:
        - account
  /v1/account/suppressions:
    get:
      description: Addresses e2a will refuse to send to (auto-added on a hard bounce or complaint, or added manually). Sends to a suppressed address fail with recipient_suppressed.
      operationId: listSuppressions
      parameters:
        - description: Opaque pagination cursor from a previous response's next_cursor. Continuation requests must not change the other filters.
          explode: false
          in: query
          name: cursor
          schema:
            description: Opaque pagination cursor from a previous response's next_cursor. Continuation requests must not change the other filters.
            type: string
        - description: Maximum number of items to return (1-100).
          explode: false
          in: query
          name: limit
          schema:
            default: 100
            description: Maximum number of items to return (1-100).
            format: int64
            maximum: 100
            minimum: 1
            type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PageSuppression"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
          description: Error
      security:
        - bearer: []
      summary: List suppressed recipient addresses
      tags:
        - account
  /v1/account/suppressions/{address}:
    delete:
      description: Un-suppress a recipient. A previously-blocked send to it then succeeds (idempotency keys are released, so no fresh key is needed). Requires ?confirm=DELETE.
      operationId: deleteSuppression
      parameters:
        - in: path
          name: address
          required: true
          schema:
            type: string
        - description: Must be the literal DELETE — this action is irreversible.
          explode: false
          in: query
          name: confirm
          required: true
          schema:
            description: Must be the literal DELETE — this action is irreversible.
            enum:
              - DELETE
            type: string
      responses:
        "204":
          description: No Content
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
          description: Error
      security:
        - bearer: []
      summary: Remove an address from the suppression list
      tags:
        - account
  /v1/agents:
    get:
      description: List the agents owned by the authenticated account, newest first, with cursor pagination.
      operationId: listAgents
      parameters:
        - description: Opaque pagination cursor from a previous response's next_cursor. Continuation requests must not change the other filters.
          explode: false
          in: query
          name: cursor
          schema:
            description: Opaque pagination cursor from a previous response's next_cursor. Continuation requests must not change the other filters.
            type: string
        - description: Maximum number of items to return (1-100).
          explode: false
          in: query
          name: limit
          schema:
            default: 100
            description: Maximum number of items to return (1-100).
            format: int64
            maximum: 100
            minimum: 1
            type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PageAgentView"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
          description: Error
      security:
        - bearer: []
      summary: List agents
      tags:
        - agents
    post:
      description: Register an agent by full email. A custom-domain agent's domain must be a verified domain the caller owns; an email on the deployment's shared domain (e.g. xyz@agents.e2a.dev) is registered as a shared-domain agent. Returns the full agent.
      operationId: createAgent
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAgentRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentView"
          description: Created
        "402":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LimitExceededEnvelope"
          description: Payment required — a per-account resource cap was hit (code limit_exceeded). error.details.resource is the AccountView usage/limits field stem (agents, domains, messages_month, storage_bytes), so the client can key it to usage.<resource> / limits.max_<resource>.
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
          description: Error — the standard envelope; branch on error.code.
      security:
        - bearer: []
      summary: Create an agent
      tags:
        - agents
  /v1/agents/{email}:
    delete:
      description: Delete an agent the caller owns. Requires ?confirm=DELETE (irreversible).
      operationId: deleteAgent
      parameters:
        - in: path
          name: email
          required: true
          schema:
            type: string
        - description: Must be the literal DELETE — this action is irreversible.
          explode: false
          in: query
          name: confirm
          required: true
          schema:
            description: Must be the literal DELETE — this action is irreversible.
            enum:
              - DELETE
            type: string
      responses:
        "204":
          description: No Content
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
          description: Error
      security:
        - bearer: []
      summary: Delete an agent
      tags:
        - agents
    get:
      description: Fetch a single agent the authenticated account owns, by full email address.
      operationId: getAgent
      parameters:
        - description: The agent's full email address, e.g. support@acme.com.
          in: path
          name: email
          required: true
          schema:
            description: The agent's full email address, e.g. support@acme.com.
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentView"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
          description: Error
      security:
        - bearer: []
      summary: Get an agent
      tags:
        - agents
    patch:
      description: Update an agent's display name. The screening/protection config lives on the /v1/agents/{email}/protection sub-resource. Returns the post-update agent.
      operationId: updateAgent
      parameters:
        - in: path
          name: email
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAgentRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentView"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
          description: Error
      security:
        - bearer: []
      summary: Update an agent
      tags:
        - agents
  /v1/agents/{email}/conversations:
    get:
      description: List an agent's conversation threads (derived from messages.conversation_id).
      operationId: listConversations
      parameters:
        - in: path
          name: email
          required: true
          schema:
            type: string
        - description: RFC3339.
          explode: false
          in: query
          name: since
          schema:
            description: RFC3339.
            type: string
        - description: RFC3339.
          explode: false
          in: query
          name: until
          schema:
            description: RFC3339.
            type: string
        - description: Opaque pagination cursor from a previous response's next_cursor. Continuation requests must not change since/until.
          explode: false
          in: query
          name: cursor
          schema:
            description: Opaque pagination cursor from a previous response's next_cursor. Continuation requests must not change since/until.
            type: string
        - explode: false
          in: query
          name: limit
          schema:
            default: 100
            format: int64
            maximum: 100
            minimum: 1
            type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PageConversationSummaryView"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
          description: Error
      security:
        - bearer: []
      summary: List conversations
      tags:
        - conversations
  /v1/agents/{email}/conversations/{id}:
    get:
      description: Fetch a single conversation thread with its participants, labels, and member messages.
      operationId: getConversation
      parameters:
        - in: path
          name: email
          required: true
          schema:
            type: string
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationDetailView"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
          description: Error
      security:
        - bearer: []
      summary: Get a conversation
      tags:
        - conversations
  /v1/agents/{email}/messages:
    get:
      description: List an agent's messages (inbound + outbound) with filters and cursor pagination. Held outbound drafts appear as status=pending_review.
      operationId: listMessages
      parameters:
        - in: path
          name: email
          required: true
          schema:
            type: string
        - description: Defaults to inbound.
          explode: false
          in: query
          name: direction
          schema:
            description: Defaults to inbound.
            enum:
              - inbound
              - outbound
              - all
            type: string
        - description: Inbound only. Filters by inbox read-state (MSG-1). Defaults to unread for inbound, all otherwise.
          explode: false
          in: query
          name: read_status
          schema:
            description: Inbound only. Filters by inbox read-state (MSG-1). Defaults to unread for inbound, all otherwise.
            enum:
              - unread
              - read
              - all
            type: string
        - description: Defaults to desc (newest first).
          explode: false
          in: query
          name: sort
          schema:
            description: Defaults to desc (newest first).
            enum:
              - asc
              - desc
            type: string
        - description: Case-insensitive substring match on sender.
          explode: false
          in: query
          name: from
          schema:
