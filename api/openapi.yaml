  securitySchemes:
    bearer:
      description: "API key (e2a_…) or OAuth 2.1 access token, sent as `Authorization: Bearer <token>`."
      scheme: bearer
      type: http
info:
  description: e2a — authenticated email gateway for AI agents. v1 contract.
  title: e2a API
  version: 1.0.0
openapi: 3.1.0
paths:
  /v1/account:
    delete:
      description: Permanently deletes the account and cascades all owned data. Requires ?confirm=DELETE.
      operationId: deleteAccount
      parameters:
        - description: Must be DELETE — this is irreversible.
          explode: false
          in: query
          name: confirm
          schema:
            description: Must be DELETE — this is irreversible.
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteUserDataResult"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
          description: Error
      security:
        - bearer: []
      summary: Delete your account + all data (irreversible)
      tags:
        - account
    get:
      description: The authenticated principal's identity (user + scope; agent_address for agent-scoped credentials), plan caps, and current usage. Works for both account- and agent-scoped credentials. (Deployment discovery — shared domain, slug registration — is the separate public GET /v1/info.)
      operationId: getAccount
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountView"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
          description: Error
      security:
        - bearer: []
      summary: "Get account: identity + plan limits + usage (whoami)"
      tags:
        - account
  /v1/account/export:
    get:
      description: A JSON dump of every record the authenticated account owns.
      operationId: exportAccount
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserExport"
          description: OK
          headers:
            Content-Disposition:
              schema:
                type: string
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
          description: Error
      security:
        - bearer: []
      summary: Export your data (GDPR right-of-access)
      tags:
        - account
  /v1/account/suppressions:
    get:
      description: Addresses e2a will refuse to send to (auto-added on a hard bounce or complaint, or added manually). Sends to a suppressed address fail with recipient_suppressed.
      operationId: listSuppressions
      parameters:
        - description: Opaque pagination cursor from a previous response's next_cursor. Continuation requests must not change the other filters.
          explode: false
          in: query
          name: cursor
          schema:
            description: Opaque pagination cursor from a previous response's next_cursor. Continuation requests must not change the other filters.
            type: string
        - description: Maximum number of items to return (1-100).
          explode: false
          in: query
          name: limit
          schema:
            default: 50
            description: Maximum number of items to return (1-100).
            format: int64
            maximum: 100
            minimum: 1
            type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PageSuppression"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
          description: Error
      security:
        - bearer: []
      summary: List suppressed recipient addresses
      tags:
        - account
  /v1/account/suppressions/{address}:
    delete:
      description: Un-suppress a recipient. A previously-blocked send to it then succeeds (idempotency keys are released, so no fresh key is needed).
      operationId: deleteSuppression
      parameters:
        - in: path
          name: address
          required: true
          schema:
            type: string
      responses:
        "204":
          description: No Content
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
          description: Error
      security:
        - bearer: []
      summary: Remove an address from the suppression list
      tags:
        - account
  /v1/agents:
    get:
      description: List the agents owned by the authenticated account.
      operationId: listAgents
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PageAgentView"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
          description: Error
      security:
        - bearer: []
      summary: List agents
      tags:
        - agents
    post:
      description: Register an agent by full email. A custom-domain agent's domain must be a verified domain the caller owns; an email on the deployment's shared domain (e.g. xyz@agents.e2a.dev) is registered as a shared-domain agent. Returns the full agent.
      operationId: createAgent
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAgentRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentView"
          description: Created
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
          description: Error
      security:
        - bearer: []
      summary: Create an agent
      tags:
        - agents
  /v1/agents/{email}:
    delete:
      description: Delete an agent the caller owns.
      operationId: deleteAgent
      parameters:
        - in: path
          name: email
          required: true
          schema:
            type: string
        - description: Must be DELETE — this is irreversible.
          explode: false
          in: query
          name: confirm
          schema:
            description: Must be DELETE — this is irreversible.
            type: string
      responses:
        "204":
          description: No Content
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
          description: Error
      security:
        - bearer: []
      summary: Delete an agent
      tags:
        - agents
    get:
      description: Fetch a single agent the authenticated account owns, by full email address.
      operationId: getAgent
      parameters:
        - description: The agent's full email address, e.g. support@acme.com.
          in: path
          name: email
          required: true
          schema:
            description: The agent's full email address, e.g. support@acme.com.
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentView"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
          description: Error
      security:
        - bearer: []
      summary: Get an agent
      tags:
        - agents
    patch:
      description: Patch an agent's HITL settings. Returns the post-update agent.
      operationId: updateAgent
      parameters:
        - in: path
          name: email
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAgentRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentView"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
          description: Error
      security:
        - bearer: []
      summary: Update an agent
      tags:
        - agents
  /v1/agents/{email}/conversations:
    get:
      description: List an agent's conversation threads (derived from messages.conversation_id).
      operationId: listConversations
      parameters:
        - in: path
          name: email
          required: true
          schema:
            type: string
        - description: RFC3339.
          explode: false
          in: query
          name: since
          schema:
            description: RFC3339.
            type: string
        - description: RFC3339.
          explode: false
          in: query
          name: until
          schema:
            description: RFC3339.
            type: string
        - description: Opaque pagination cursor from a previous response's next_cursor. Continuation requests must not change since/until.
          explode: false
          in: query
          name: cursor
          schema:
            description: Opaque pagination cursor from a previous response's next_cursor. Continuation requests must not change since/until.
            type: string
        - explode: false
          in: query
          name: limit
          schema:
            default: 100
            format: int64
            maximum: 100
            minimum: 1
            type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PageConversationSummaryView"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
          description: Error
      security:
        - bearer: []
      summary: List conversations
      tags:
        - conversations
  /v1/agents/{email}/conversations/{id}:
    get:
      description: Fetch a single conversation thread with its participants, labels, and member messages.
      operationId: getConversation
      parameters:
        - in: path
          name: email
          required: true
          schema:
            type: string
        - in: path
          name: id
          required: true
          schema:
            type: string
