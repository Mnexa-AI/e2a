info:
  description: |-
    e2a — authenticated email gateway for AI agents. v1 contract.

    ## Stability policy

    The v1 surface is stable and evolves **additively only**: new endpoints, new optional request fields, new response fields, and new values in open string sets (event types, statuses) may appear at any time without a version bump. Clients MUST tolerate unknown response fields and unknown values in open string sets. This is machine-readable in the schemas: response schemas declare `additionalProperties: true`; request schemas stay strict (`additionalProperties: false` — an unknown request field is rejected with 422).

    Operations and schemas marked `x-stability-level: beta` are exempt from this freeze and may change or be removed without a major version. A field marked `x-experimental-values` is itself stable, but the listed values (and their event payloads) are experimental. Everything not marked beta, or enumerated as experimental, is stable.

    Removing or changing stable surface only happens on a new major version path (/v2); deprecations are announced ahead of time via `deprecated: true` in this document and keep working within v1.
  title: e2a API
  version: 1.0.0
openapi: 3.1.0
paths:
  /v1/account:
    delete:
      description: Permanently deletes the account and cascades all owned data. Requires ?confirm=DELETE. Returns 200 with a deletion receipt (deleted:true plus per-table cascade counts) — like every delete op, which all return 200 + a deletion object.
      operationId: deleteAccount
      parameters:
        - description: Must be the literal DELETE — this action is irreversible.
          explode: false
          in: query
          name: confirm
          required: true
          schema:
            description: Must be the literal DELETE — this action is irreversible.
            enum:
              - DELETE
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteUserDataResult"
          description: OK
          headers:
            X-Request-Id:
              $ref: "#/components/headers/XRequestID"
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
          description: Error
          headers:
            X-Request-Id:
              $ref: "#/components/headers/XRequestID"
      security:
        - bearer: []
      summary: Delete your account + all data (irreversible)
      tags:
        - account
    get:
      description: The authenticated principal's identity (user + scope; agent_email for agent-scoped credentials), plan caps, and current usage. Works for both account- and agent-scoped credentials. (Deployment discovery — shared domain, slug registration — is the separate public GET /v1/info.)
      operationId: getAccount
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountView"
          description: OK
          headers:
            X-Request-Id:
              $ref: "#/components/headers/XRequestID"
        "503":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
          description: "Service Unavailable — code limits_unavailable: the limits subsystem is temporarily unavailable. Wait Retry-After seconds, then retry."
          headers:
            Retry-After:
              $ref: "#/components/headers/RetryAfter"
            X-Request-Id:
              $ref: "#/components/headers/XRequestID"
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
          description: Error — the standard envelope; branch on error.code.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/XRequestID"
      security:
        - bearer: []
      summary: "Get account: identity + plan limits + usage (whoami)"
      tags:
        - account
  /v1/account/api-keys:
    get:
      description: "API keys for the account (metadata only — secrets are shown once, at creation). Account scope only: an agent-scoped credential cannot manage keys."
      operationId: listApiKeys
      parameters:
        - description: Opaque pagination cursor from a previous response's next_cursor. Continuation requests must not change the other filters.
          explode: false
          in: query
          name: cursor
          schema:
            description: Opaque pagination cursor from a previous response's next_cursor. Continuation requests must not change the other filters.
            type: string
        - description: Maximum number of items to return (1-100).
          explode: false
          in: query
          name: limit
          schema:
            default: 100
            description: Maximum number of items to return (1-100).
            format: int64
            maximum: 100
            minimum: 1
            type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PageAPIKeyView"
          description: OK
          headers:
            X-Request-Id:
              $ref: "#/components/headers/XRequestID"
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
          description: Error
          headers:
            X-Request-Id:
              $ref: "#/components/headers/XRequestID"
      security:
        - bearer: []
      summary: List API keys
      tags:
        - account
    post:
      description: Mint a new API key; the plaintext key is returned once. scope=account is workspace admin (agent/domain/key management); scope=agent binds the key to one inbox so it can act only as that agent. Account scope only.
      operationId: createApiKey
      parameters:
        - description: "Optional idempotency key for safe retries (unique per logical request). A retry with the same key and byte-identical body replays the first request's response — the SAME key — instead of minting a second live credential. Completed keys are remembered for at least 24 hours (the published minimum dedup window). Within the window: same key + different body → 422 idempotency_key_reuse (do not retry as-is); same key while the first request is still executing → 409 idempotency_in_flight (wait, then retry unchanged). Dedup is best-effort: under idempotency-store degradation or a mid-request crash the guarantee degrades to at-least-once — a keyed retry may mint a new key rather than replay."
          in: header
          name: Idempotency-Key
          schema:
            description: "Optional idempotency key for safe retries (unique per logical request). A retry with the same key and byte-identical body replays the first request's response — the SAME key — instead of minting a second live credential. Completed keys are remembered for at least 24 hours (the published minimum dedup window). Within the window: same key + different body → 422 idempotency_key_reuse (do not retry as-is); same key while the first request is still executing → 409 idempotency_in_flight (wait, then retry unchanged). Dedup is best-effort: under idempotency-store degradation or a mid-request crash the guarantee degrades to at-least-once — a keyed retry may mint a new key rather than replay."
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAPIKeyRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAPIKeyResponse"
          description: Created
          headers:
            X-Request-Id:
              $ref: "#/components/headers/XRequestID"
        "409":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
          description: "Conflict — code idempotency_in_flight: a request with this Idempotency-Key is still executing. Retry-able: wait for the first request to finish, then retry with the SAME key and byte-identical body — the retry replays the first request's response instead of re-executing the side effect."
          headers:
            X-Request-Id:
              $ref: "#/components/headers/XRequestID"
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
          description: "Unprocessable — branch on error.code. idempotency_key_reuse: this Idempotency-Key was already used with a DIFFERENT request body (the dedup hash covers the route + the raw body bytes) — do NOT retry as-is; a legitimate retry must resend the byte-identical body, and a genuinely new request needs a fresh key. invalid_request: a semantic validation failure in the request body."
          headers:
            X-Request-Id:
              $ref: "#/components/headers/XRequestID"
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
          description: Error — the standard envelope; branch on error.code.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/XRequestID"
      security:
        - bearer: []
      summary: Create an API key
      tags:
        - account
  /v1/account/api-keys/{id}:
    delete:
      description: Revoke a key by id. Integrations using it stop authenticating immediately. Account scope only. Requires ?confirm=DELETE. Returns 200 with a deletion object ({deleted:true, id}).
      operationId: deleteApiKey
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - description: Must be the literal DELETE — this action is irreversible.
          explode: false
          in: query
          name: confirm
          required: true
          schema:
            description: Must be the literal DELETE — this action is irreversible.
            enum:
              - DELETE
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteApiKeyResult"
          description: OK
