components:
  schemas:
    APIKeyExportEntry:
      additionalProperties: false
      properties:
        created_at:
          format: date-time
          type: string
        id:
          type: string
        key_prefix:
          type: string
        last_used_at:
          format: date-time
          type: string
        name:
          type: string
        revoked_at:
          format: date-time
          type: string
      required:
        - id
        - name
        - key_prefix
        - created_at
      type: object
    AccountUserView:
      additionalProperties: false
      properties:
        email:
          type: string
        id:
          type: string
      required:
        - id
        - email
      type: object
    AccountView:
      additionalProperties: false
      properties:
        agent_address:
          type: string
        limits:
          $ref: "#/components/schemas/LimitsCapsView"
        plan_code:
          type: string
        scope:
          enum:
            - account
            - agent
          type: string
        upgrade_url:
          type: string
        usage:
          $ref: "#/components/schemas/LimitsUsageView"
        user:
          $ref: "#/components/schemas/AccountUserView"
      required:
        - user
        - scope
        - plan_code
        - limits
        - usage
        - upgrade_url
      type: object
    AgentIdentity:
      additionalProperties: false
      properties:
        created_at:
          format: date-time
          type: string
        domain:
          type: string
        domain_verified:
          type: boolean
        email:
          type: string
        hitl_expiration_action:
          type: string
        hitl_ttl_seconds:
          format: int64
          type: integer
        id:
          type: string
        inbound_7d:
          format: int64
          type: integer
        inbound_allowlist:
          items:
            type: string
          type:
            - array
            - "null"
        inbound_policy:
          type: string
        inbound_policy_action:
          type: string
        inbound_scan:
          type: string
        inbound_scan_block_threshold:
          format: double
          type: number
        inbound_scan_review_threshold:
          format: double
          type: number
        last_delivery_at:
          format: date-time
          type: string
        name:
          type: string
        outbound_7d:
          format: int64
          type: integer
        outbound_allowlist:
          items:
            type: string
          type:
            - array
            - "null"
        outbound_policy:
          type: string
        outbound_policy_action:
          type: string
        outbound_scan:
          type: string
        outbound_scan_block_threshold:
          format: double
          type: number
        outbound_scan_review_threshold:
          format: double
          type: number
        pending_count:
          format: int64
          type: integer
        public:
          type: boolean
        user_id:
          type: string
        webhook_healthy:
          type: boolean
      required:
        - id
        - domain
        - email
        - name
        - domain_verified
        - public
        - created_at
        - user_id
        - hitl_ttl_seconds
        - hitl_expiration_action
        - inbound_7d
        - outbound_7d
        - pending_count
        - webhook_healthy
        - inbound_policy
        - inbound_policy_action
        - outbound_policy
        - outbound_policy_action
        - inbound_scan
        - inbound_scan_review_threshold
        - inbound_scan_block_threshold
        - outbound_scan
        - outbound_scan_review_threshold
        - outbound_scan_block_threshold
      type: object
    AgentView:
      additionalProperties: false
      properties:
        created_at:
          format: date-time
          type: string
        domain:
          type: string
        domain_verified:
          type: boolean
        email:
          type: string
        hitl_expiration_action:
          enum:
