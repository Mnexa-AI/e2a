components:
  schemas:
    APIKeyExportEntry:
      additionalProperties: false
      properties:
        created_at:
          format: date-time
          type: string
        id:
          type: string
        key_prefix:
          type: string
        last_used_at:
          format: date-time
          type: string
        name:
          type: string
        revoked_at:
          format: date-time
          type: string
      required:
        - id
        - name
        - key_prefix
        - created_at
      type: object
    APIKeyView:
      additionalProperties: false
      properties:
        agent_email:
          description: Bound inbox email for agent-scoped keys; omitted for account scope.
          type: string
        created_at:
          format: date-time
          type: string
        expires_at:
          format: date-time
          type: string
        id:
          type: string
        key_prefix:
          description: Non-secret visible prefix (e.g. e2a_acct_… / e2a_agt_…).
          type: string
        last_used_at:
          format: date-time
          type: string
        name:
          type: string
        scope:
          description: account = workspace admin; agent = bound to one inbox.
          enum:
            - account
            - agent
          type: string
      required:
        - id
        - name
        - key_prefix
        - scope
        - created_at
      type: object
    AccountUserView:
      additionalProperties: false
      properties:
        email:
          type: string
        id:
          type: string
      required:
        - id
        - email
      type: object
    AccountView:
      additionalProperties: false
      properties:
        agent_email:
          type: string
        limits:
          $ref: "#/components/schemas/LimitsCapsView"
        plan_code:
          type: string
        scope:
          enum:
            - account
            - agent
          type: string
        upgrade_url:
          type: string
        usage:
          $ref: "#/components/schemas/LimitsUsageView"
        user:
          $ref: "#/components/schemas/AccountUserView"
      required:
        - user
        - scope
        - plan_code
        - limits
        - usage
        - upgrade_url
      type: object
    AgentIdentity:
      additionalProperties: false
      properties:
        created_at:
          format: date-time
          type: string
        domain:
          type: string
        domain_verified:
          type: boolean
        email:
          type: string
        inbound_7d:
          format: int64
          type: integer
        inbound_allowlist:
          items:
            type: string
          type:
            - array
            - "null"
        inbound_policy:
          type: string
        inbound_policy_action:
          type: string
        inbound_scan:
          type: string
        inbound_scan_block_threshold:
          format: double
          type: number
        inbound_scan_review_threshold:
          format: double
          type: number
        inbound_scan_sensitivity:
          type: string
        last_delivery_at:
          format: date-time
          type: string
        name:
          type: string
        on_expiry:
          type: string
        outbound_7d:
          format: int64
          type: integer
        outbound_allowlist:
          items:
            type: string
          type:
            - array
            - "null"
        outbound_policy:
          type: string
        outbound_policy_action:
          type: string
        outbound_scan:
          type: string
        outbound_scan_block_threshold:
          format: double
          type: number
        outbound_scan_review_threshold:
          format: double
          type: number
        outbound_scan_sensitivity:
          type: string
        pending_count:
          format: int64
          type: integer
        public:
          type: boolean
        ttl_seconds:
          format: int64
          type: integer
        user_id:
          type: string
        webhook_healthy:
          type: boolean
      required:
        - domain
        - email
        - name
        - domain_verified
        - public
        - created_at
        - user_id
        - ttl_seconds
        - on_expiry
        - inbound_7d
        - outbound_7d
        - pending_count
        - webhook_healthy
        - inbound_policy
        - inbound_policy_action
        - outbound_policy
        - outbound_policy_action
        - inbound_scan
        - inbound_scan_review_threshold
        - inbound_scan_block_threshold
        - outbound_scan
        - outbound_scan_review_threshold
        - outbound_scan_block_threshold
        - inbound_scan_sensitivity
        - outbound_scan_sensitivity
      type: object
    AgentView:
      additionalProperties: false
      properties:
        created_at:
          format: date-time
          type: string
        domain:
          type: string
        domain_verified:
          type: boolean
        email:
          type: string
        name:
          type: string
      required:
        - domain
        - email
        - name
        - domain_verified
        - created_at
      type: object
    ApproveRequest:
      additionalProperties: false
      properties:
        attachments:
          items:
            $ref: "#/components/schemas/Attachment"
          type: array
        bcc:
          items:
            type: string
          type: array
        cc:
          items:
            type: string
          type: array
        html:
          type: string
        subject:
          type: string
        text:
          type: string
        to:
          items:
            type: string
          type: array
      type: object
    Attachment:
      additionalProperties: false
      properties:
        content_type:
          examples:
            - application/pdf
          type: string
        data:
          description: Base64-encoded file content. Each attachment must be ≤ 10 MB decoded; a message may carry at most 10 attachments totaling ≤ 25 MB decoded.
          examples:
            - base64-encoded-content
          type: string
        filename:
          examples:
            - report.pdf
          type: string
      required:
        - filename
        - content_type
        - data
      type: object
    AttachmentMetaView:
      additionalProperties: false
      properties:
        content_type:
          type: string
        filename:
          type: string
        index:
          format: int64
          type: integer
        size_bytes:
          format: int64
          type: integer
      required:
        - index
        - size_bytes
      type: object
    AttachmentView:
      additionalProperties: false
      properties:
        content_type:
          type: string
        data:
          type: string
        download_url:
          type: string
        expires_at:
          format: date-time
          type: string
        filename:
          type: string
        index:
          format: int64
          type: integer
        size_bytes:
          format: int64
          type: integer
      required:
        - index
        - size_bytes
        - download_url
        - expires_at
      type: object
    AuthVerdict:
      additionalProperties: false
      properties:
        dkim:
          $ref: "#/components/schemas/CheckResult"
        dmarc:
          $ref: "#/components/schemas/CheckResult"
        spf:
          $ref: "#/components/schemas/CheckResult"
      required:
        - spf
        - dkim
        - dmarc
      type: object
    CheckResult:
      additionalProperties: false
      properties:
        detail:
          type: string
        status:
          type: string
      required:
        - status
      type: object
    ConversationDetailView:
      additionalProperties: false
      properties:
        first_message_at:
          format: date-time
          type: string
        has_unread:
          type: boolean
        id:
          type: string
        inbound_count:
          format: int64
          type: integer
        labels:
          items:
            type: string
          type: array
        last_message_at:
          format: date-time
          type: string
        latest_from:
          type: string
        latest_subject:
          type: string
        message_count:
          format: int64
          type: integer
        messages:
          items:
            $ref: "#/components/schemas/MessageSummaryView"
          type: array
        outbound_count:
          format: int64
          type: integer
        participants:
          items:
            type: string
          type: array
      required:
        - participants
        - labels
        - messages
        - id
        - last_message_at
        - first_message_at
        - message_count
        - inbound_count
        - outbound_count
        - has_unread
        - latest_subject
        - latest_from
      type: object
    ConversationSummaryView:
      additionalProperties: false
      properties:
        first_message_at:
          format: date-time
          type: string
        has_unread:
          type: boolean
        id:
          type: string
        inbound_count:
          format: int64
          type: integer
        last_message_at:
          format: date-time
          type: string
        latest_from:
          type: string
        latest_subject:
          type: string
        message_count:
          format: int64
          type: integer
        outbound_count:
          format: int64
          type: integer
      required:
        - id
        - last_message_at
        - first_message_at
        - message_count
        - inbound_count
        - outbound_count
        - has_unread
        - latest_subject
        - latest_from
      type: object
    CreateAPIKeyRequest:
      additionalProperties: false
      properties:
        agent_email:
          description: Inbox email to bind the key to; required when scope=agent.
          type: string
        expires_at:
          description: Optional hard expiry (RFC 3339, must be in the future). Omit for a never-expiring key.
          format: date-time
          type: string
        name:
          description: Human label for the key.
          type: string
        scope:
          description: account = workspace admin (default); agent = bound to a single inbox.
          enum:
            - account
            - agent
          type: string
      type: object
    CreateAPIKeyResponse:
      additionalProperties: false
      properties:
        agent_email:
          description: Bound inbox email for agent-scoped keys; omitted for account scope.
          type: string
        created_at:
          format: date-time
          type: string
        expires_at:
          format: date-time
          type: string
        id:
          type: string
        key:
          description: The secret key. Shown once; store it now — it cannot be retrieved later.
          type: string
        key_prefix:
          description: Non-secret visible prefix (e.g. e2a_acct_… / e2a_agt_…).
          type: string
        last_used_at:
          format: date-time
          type: string
        name:
          type: string
        scope:
          description: account = workspace admin; agent = bound to one inbox.
          enum:
            - account
            - agent
          type: string
      required:
        - key
        - id
        - name
        - key_prefix
        - scope
        - created_at
      type: object
    CreateAgentRequest:
      additionalProperties: false
      properties:
        email:
          type: string
        name:
          type: string
      required:
        - email
      type: object
    CreateTemplateRequest:
      additionalProperties: false
      properties:
        alias:
          description: Optional per-user unique handle ([A-Za-z][A-Za-z0-9._-]{0,127}) usable as template_alias on send.
          type: string
        from_starter:
          description: "Copy a starter template (by alias, see GET /v1/starter-templates) verbatim into your library. Mutually exclusive with subject, text and html — the copy is verbatim; edit the created template afterwards. name and alias default to the starter's and may be overridden. Beta: templates are unstable — their shape may change before they are declared stable."
          type: string
        html:
          description: Optional HTML body template source ({{x}} is HTML-escaped, {{{x}}} is raw).
          type: string
        name:
          description: Human-readable template name. Required unless from_starter supplies the default.
          type: string
        subject:
          description: Subject template source ({{variable}} interpolation, no HTML escaping). Required unless from_starter is set.
          type: string
        text:
          description: Plain-text body template source (no HTML escaping). Required unless from_starter is set.
          type: string
      type: object
    CreateWebhookRequest:
      additionalProperties: false
      properties:
        description:
          type: string
        events:
          description: "Beta: the screening + review-hold events (email.flagged, email.blocked, email.pending_review, email.review_approved, email.review_rejected) are unstable — their payload may change before they are declared stable. All other events are stable."
          items:
            enum:
              - email.received
              - email.sent
              - email.failed
              - email.deferred
              - email.review_approved
              - email.review_rejected
              - domain.sending_verified
              - domain.sending_failed
              - email.delivered
              - email.bounced
              - email.complained
              - domain.suppression_added
              - email.flagged
              - email.blocked
              - email.pending_review
            type: string
          type: array
        filters:
          $ref: "#/components/schemas/WebhookFiltersView"
        url:
          type: string
      required:
        - url
        - events
      type: object
    CreateWebhookResponse:
      additionalProperties: false
      properties:
        auto_disabled_at:
          format: date-time
          type: string
        created_at:
          format: date-time
          type: string
        description:
          type: string
        enabled:
          type: boolean
        events:
          description: "The event types this webhook matches. Open set: new event types may be added over time, so treat these as strings and tolerate unknown values. Known values: email.received, email.sent, email.failed, email.deferred, email.delivered, email.bounced, email.complained, email.flagged, email.blocked, email.pending_review, email.review_approved, email.review_rejected, domain.sending_verified, domain.sending_failed, domain.suppression_added. Beta: the screening + review-hold events (email.flagged, email.blocked, email.pending_review, email.review_approved, email.review_rejected) are unstable — their payload may change before they are declared stable."
          items:
            type: string
          type: array
        filters:
          $ref: "#/components/schemas/WebhookFiltersView"
        id:
          type: string
        last_delivered_at:
          format: date-time
          type: string
        signing_secret:
          type: string
        url:
          type: string
      required:
        - signing_secret
        - id
        - url
        - description
        - events
        - filters
        - enabled
        - created_at
      type: object
    DNSRecord:
      additionalProperties: false
      properties:
        name:
          description: Record name (host). The apex domain for ownership/inbound_mx; an FQDN for dkim/mail_from records.
          type: string
        priority:
          description: MX priority. Null for non-MX records.
          format: int64
          type:
            - integer
            - "null"
        purpose:
          description: "What the record is for. Open set; tolerate unknown values. Known values: ownership, inbound_mx, dkim, mail_from_mx, mail_from_spf."
          type: string
        status:
          description: "Per-record verification state. Open set; tolerate unknown values. Known values: verified, pending, missing, failed. Inbound records (ownership, inbound_mx) become verified once inbound verification passes, which requires BOTH the ownership TXT and the inbound MX. Sending records reflect their own SES axis: the dkim record follows the DKIM axis, while mail_from_mx and mail_from_spf follow the custom MAIL FROM axis, so a domain with working DKIM but a broken MAIL FROM (or the reverse) shows exactly which record to fix rather than failing all three. Before SES has reported a per-axis result (pre-provision rows) the sending records fall back to the all-or-nothing sending_status rollup; consult sending_error for the failure reason. The domain-level sending_status field remains the all-or-nothing rollup summary."
          type: string
        type:
          description: DNS record type. MX or TXT.
          type: string
        value:
          description: Record value. For MX records this is the mail-server host only; the priority is in the priority field.
          type: string
      required:
        - type
        - name
        - value
        - priority
        - purpose
        - status
      type: object
    DeleteUserDataResult:
      additionalProperties: false
      properties:
        agents_deleted:
          format: int64
          type: integer
        api_keys_deleted:
          format: int64
          type: integer
        domains_deleted:
          format: int64
          type: integer
        messages_deleted:
          format: int64
          type: integer
        oauth_access_tokens_deleted:
          format: int64
          type: integer
        oauth_auth_codes_deleted:
          format: int64
          type: integer
        oauth_refresh_tokens_deleted:
          format: int64
          type: integer
        sessions_deleted:
          format: int64
          type: integer
        usage_events_deleted:
          format: int64
          type: integer
        usage_summaries_deleted:
          format: int64
          type: integer
        user_deleted:
          type: boolean
      required:
        - usage_events_deleted
        - usage_summaries_deleted
        - messages_deleted
        - agents_deleted
        - domains_deleted
        - api_keys_deleted
        - sessions_deleted
        - user_deleted
      type: object
    DeliveryStatusJSON:
      additionalProperties: false
      properties:
        delivered:
          format: int64
          type: integer
        failed:
          format: int64
          type: integer
        matched_webhooks:
          format: int64
          type: integer
        pending:
          format: int64
          type: integer
      required:
        - matched_webhooks
        - delivered
        - pending
        - failed
      type: object
    DeploymentInfoView:
      additionalProperties: false
      properties:
        public_url:
          type: string
        shared_domain:
          type: string
        slug_registration_enabled:
          type: boolean
        version:
          type: string
      required:
        - version
        - shared_domain
        - slug_registration_enabled
      type: object
    Domain:
      additionalProperties: false
      properties:
        agent_count:
          format: int64
          type: integer
        created_at:
          format: date-time
          type: string
        dkim_public_key:
          type: string
        dkim_selector:
          type: string
        domain:
          type: string
        last_checked_at:
          format: date-time
          type: string
        primary:
          type: boolean
        sending_error:
          type: string
        sending_last_checked_at:
          format: date-time
          type: string
        sending_status:
          type: string
        user_id:
          type: string
        verification_token:
          type: string
        verified:
          type: boolean
        verified_at:
          format: date-time
          type: string
      required:
        - domain
        - verified
        - verification_token
        - created_at
        - primary
        - agent_count
        - sending_status
      type: object
    DomainView:
      additionalProperties: false
      properties:
        agent_count:
          format: int64
          type: integer
        created_at:
          format: date-time
          type: string
        dns_records:
          items:
            $ref: "#/components/schemas/DNSRecord"
          type: array
        domain:
          type: string
        last_checked_at:
          format: date-time
          type: string
        sending_error:
          type: string
        sending_last_checked_at:
          format: date-time
          type: string
        sending_status:
          description: "Async SES sending-identity state (rollup). Open set; tolerate unknown values. Known values: none, pending, verified, failed."
          type: string
        verification_token:
          type: string
        verified:
          type: boolean
        verified_at:
          format: date-time
          type: string
      required:
        - domain
        - verified
        - verification_token
        - dns_records
        - created_at
        - agent_count
        - sending_status
      type: object
    ErrorBody:
      additionalProperties: false
      properties:
        code:
          description: "Machine-branchable error code — the stable discriminator clients switch on. Open set: treat it as a string and tolerate unknown values, since new codes may be added over time (branch on the ones you handle, fall back to the HTTP status otherwise). Known values: invalid_request, unauthorized, forbidden, not_found, conflict, gone, method_not_allowed, payload_too_large, unsupported_media_type, rate_limited, limit_exceeded, internal_error — plus resource-specific codes (e.g. domain_not_verified, invalid_cursor, idempotency_in_flight, idempotency_key_reuse) and the *_not_found / *_exists suffix families. A single canonical code, invalid_request, covers all input-validation failures whether they arrive as 400 (malformed) or 422 (semantically invalid)."
          type: string
        details:
          anyOf:
            - $ref: "#/components/schemas/ValidationErrorDetails"
            - type: object
          description: Optional structured context, polymorphic by code. For invalid_request it is a ValidationErrorDetails ({"fields":[{"location","message"}]}); rate_limited and limit_exceeded carry {"retry_after_seconds"}. Treat it as an open object keyed off code — new codes may introduce new detail shapes.
        message:
          description: Human-readable explanation. Not for branching — use code.
          type: string
        request_id:
          description: Echoes the X-Request-Id response header so a failing call is greppable in logs.
          type: string
      required:
        - code
        - message
      type: object
    ErrorEnvelope:
      additionalProperties: false
      properties:
        error:
          $ref: "#/components/schemas/ErrorBody"
      required:
        - error
      type: object
    EventJSON:
      additionalProperties: false
      properties:
        agent_email:
          type: string
        conversation_id:
          type: string
        created_at:
          format: date-time
          type: string
        data:
          additionalProperties: {}
          type: object
        delivery_status:
          $ref: "#/components/schemas/DeliveryStatusJSON"
        id:
          type: string
        message_id:
          type: string
        schema_version:
          description: Envelope schema version — a semver-ish string label (currently "1").
          type: string
        status:
          description: "Event processing state. Open set; tolerate unknown values. Known values: pending, processed, no_match."
          type: string
        type:
          description: "Event type. Open set: new event types may be added over time, so treat as a string and tolerate unknown values. Known values: email.received, email.sent, email.delivered, email.bounced, email.complained, email.flagged, email.blocked, email.pending_review, email.review_approved, email.review_rejected, domain.sending_verified, domain.sending_failed, domain.suppression_added."
          type: string
      required:
        - id
        - type
        - schema_version
        - created_at
        - status
        - data
      type: object
    FieldError:
      additionalProperties: false
      properties:
        location:
          description: Path-like pointer to the offending field, prefixed with the request part it came from, e.g. body.events, body.items[3].tags, query.limit, path.id. Empty when the failure is not tied to a single field.
          type: string
        message:
          description: Human-readable reason this field is invalid.
          type: string
      required:
        - message
      type: object
    ForwardRequest:
      additionalProperties: false
      properties:
        attachments:
          description: "Additional attachments to include alongside the forwarded message's original attachments, which are carried over automatically. Limits apply to the combined set (originals + these): at most 10 attachments, each ≤ 10 MB decoded, and ≤ 25 MB decoded combined. Exceeding the count → 400 invalid_request; exceeding a size → 413 payload_too_large."
          items:
            $ref: "#/components/schemas/Attachment"
          type: array
        bcc:
          items:
            type: string
          type: array
        cc:
          items:
            type: string
          type: array
        conversation_id:
          type: string
        html:
          type: string
        reply_to:
          description: Sets the Reply-To header — where replies to this message are directed. A single RFC 5322 address, optionally with a display name. Defaults to the sending agent's own address.
          type: string
        text:
          type: string
        to:
          items:
            type: string
          type: array
      required:
        - to
        - text
      type: object
    LimitExceededDetails:
      additionalProperties: false
      properties:
        current:
          description: The account's usage at the time the cap was hit (matches usage.<resource>).
          format: int64
          type: integer
        limit:
          description: The cap that was hit (matches limits.max_<resource>).
          format: int64
          type: integer
        plan_code:
          description: The account's plan label.
          type: string
        resource:
          description: The AccountView usage/limits field stem the cap applies to. Key it to usage.<resource> and limits.max_<resource>.
          enum:
            - agents
            - domains
            - messages_month
            - storage_bytes
          type: string
        upgrade_url:
          description: An upgrade affordance URL, when the operator has configured one.
          type: string
      required:
        - resource
        - limit
        - current
      type: object
    LimitExceededEnvelope:
      additionalProperties: false
      properties:
        error:
          $ref: "#/components/schemas/LimitExceededErrorBody"
      required:
        - error
      type: object
    LimitExceededErrorBody:
      additionalProperties: false
      properties:
        code:
          description: Always limit_exceeded for this response.
          enum:
            - limit_exceeded
          type: string
        details:
          $ref: "#/components/schemas/LimitExceededDetails"
        message:
          type: string
        request_id:
          type: string
      required:
        - code
        - message
        - details
      type: object
    LimitsCapsView:
      additionalProperties: false
      properties:
        max_agents:
          format: int64
          type: integer
        max_domains:
          format: int64
          type: integer
        max_messages_month:
          format: int64
          type: integer
        max_storage_bytes:
          format: int64
          type: integer
      required:
        - max_agents
        - max_domains
        - max_messages_month
        - max_storage_bytes
      type: object
    LimitsUsageView:
      additionalProperties: false
      properties:
        agents:
          format: int64
          type: integer
        domains:
          format: int64
          type: integer
        messages_month:
          format: int64
          type: integer
        storage_bytes:
          format: int64
          type: integer
      required:
