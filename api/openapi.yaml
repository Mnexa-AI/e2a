          name: index
          required: true
          schema:
            format: int64
            minimum: 0
            type: integer
        - description: When true, also include the bytes as base64 in 'data' — ONLY for attachments <= 256 KB; larger inline requests are rejected (413). Default false (use download_url).
          explode: false
          in: query
          name: inline
          schema:
            description: When true, also include the bytes as base64 in 'data' — ONLY for attachments <= 256 KB; larger inline requests are rejected (413). Default false (use download_url).
