services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: e2a
      POSTGRES_PASSWORD: e2a
      POSTGRES_DB: e2a
    # Port 5433 is exposed to the host for local-dev convenience (psql, migrations).
    # In production, drop this `ports:` block — the e2a service connects via the
    # internal docker network on :5432 and doesn't need host exposure.
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U e2a -d e2a"]
      interval: 2s
      timeout: 5s
      retries: 15

  e2a:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - "2525:2525"
      - "8080:8080"
    environment:
      E2A_DATABASE_URL: "postgres://e2a:e2a@postgres:5432/e2a?sslmode=disable"
      E2A_HMAC_SECRET: "change-me-in-production"
      # Demo shared domain so the README's slug-based `agents register`
      # example works without DNS setup. agents.localhost never resolves
      # externally, so no real mail will arrive — fine for an API smoke
      # test. Production deployments override this to a real mail
      # domain (or unset it to disable slug registration entirely).
      E2A_SHARED_DOMAIN: "agents.localhost"
    # Healthcheck is defined in the Dockerfile (HEALTHCHECK instruction)
    # so it travels with the image. Anyone using the image — including
    # this compose file — gets it for free.

  web:
    build:
      context: web
      dockerfile: Dockerfile
    depends_on:
      e2a:
        condition: service_started
    restart: unless-stopped
    ports:
      - "3000:80"
    environment:
      # Caddy proxies /api/* to this URL. The default service name "e2a"
      # resolves on the compose network — no extra config needed.
      E2A_BACKEND: "http://e2a:8080"

volumes:
  pgdata:
