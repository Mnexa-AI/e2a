name: Publish MCP HTTP server image

on:
  push:
    tags:
      - "mcp-http-v*"
    branches: [main]
    paths:
      - "mcp/**"
      - "sdks/typescript/**"
      - ".github/workflows/publish-mcp-http.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false # never cancel a running publish

jobs:
  build-push:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tags
        id: tags
        run: |
          set -euo pipefail
          tags="ghcr.io/mnexa-ai/e2a-mcp-http:${{ github.sha }}"
          if [[ "${{ github.ref }}" == refs/tags/mcp-http-v* ]]; then
            version="${GITHUB_REF#refs/tags/mcp-http-v}"
            tags="${tags}"$'\n'"ghcr.io/mnexa-ai/e2a-mcp-http:${version}"
            tags="${tags}"$'\n'"ghcr.io/mnexa-ai/e2a-mcp-http:latest"
          elif [[ "${{ github.ref }}" == refs/heads/main ]]; then
            tags="${tags}"$'\n'"ghcr.io/mnexa-ai/e2a-mcp-http:main"
          fi
          {
            echo 'value<<EOF'
            echo "${tags}"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: mcp/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
