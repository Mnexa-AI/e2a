name: Publish MCP HTTP server image

on:
  push:
    branches: [main]
    tags:
      # Product releases co-version the MCP image with the server (a `v*`
      # tag builds e2a-mcp-http:<version> alongside e2a:<version>), plus the
      # independent MCP-only release track.
      - "v*"
      - "mcp-http-v*"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false # never cancel a running publish

jobs:
  build-push:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v4

      - name: Resolve MCP server version
        id: server-version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/mcp-http-v* ]]; then
            value="${GITHUB_REF_NAME#mcp-http-v}"
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            value="${GITHUB_REF_NAME#v}"
          else
            product_version="$(tr -d '[:space:]' < VERSION)"
            value="${product_version}+sha.${GITHUB_SHA:0:12}"
          fi
          test -n "${value}"
          echo "value=${value}" >> "${GITHUB_OUTPUT}"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Same tag policy as the server image (build-image.yml) so the MCP image
      # is versioned and pinnable identically:
      #   :main             — floating tip of main (every main push)
      #   :sha-<commit>      — immutable per-commit (matches the server's sha- prefix)
      #   :<version>         — on a `v*` product release (e.g. 1.0.6), co-versioned
      #                        with the server; OR on an `mcp-http-v*` MCP-only release
      #   :latest           — only on a release tag, never the untested tip of main
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/tokencanopy/e2a-mcp-http
          tags: |
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-,format=long
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=match,pattern=^mcp-http-v(.*),group=1,enable=${{ startsWith(github.ref, 'refs/tags/mcp-http-v') }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: mcp/Dockerfile
          build-args: |
            MCP_SERVER_VERSION=${{ steps.server-version.outputs.value }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
