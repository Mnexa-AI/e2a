name: Tests

on:
  push:
    # Restrict push trigger to main: feature-branch pushes only fire the
    # pull_request event (via synchronize) once a PR is open, avoiding
    # duplicate runs that GitHub Actions otherwise produces when both
    # events fire on the same SHA.
    branches: [main]
    paths-ignore:
      # Top-level docs only — keep CI running for SDK/CLI READMEs
      # since those ship to npm/PyPI as part of the package.
      - "README.md"
      - "CLAUDE.md"
      - "LICENSE"
      - "NOTICE"
  pull_request:
    paths-ignore:
      # Top-level docs only — keep CI running for SDK/CLI READMEs
      # since those ship to npm/PyPI as part of the package.
      - "README.md"
      - "CLAUDE.md"
      - "LICENSE"
      - "NOTICE"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    name: Go tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true
      - run: go test ./...

  go-coverage:
    name: Go coverage gate
    runs-on: ubuntu-latest
    timeout-minutes: 12
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: e2a
          POSTGRES_PASSWORD: e2a
          POSTGRES_DB: e2a_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U e2a -d e2a_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true
      # Generate the coverage profile with the test DB available (the webhook
      # delivery/publish + httpapi suites are DB-backed; -p 1 avoids cross-
      # package test-DB contention). Floors live in .testcoverage.yml.
      - name: Generate coverage profile
        run: make cover
      - name: Enforce per-package coverage floors
        uses: vladopajic/go-test-coverage@v2
        with:
          config: ./.testcoverage.yml

  go-e2e:
    name: Go e2e tests
    runs-on: ubuntu-latest
    timeout-minutes: 12
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: e2a
          POSTGRES_PASSWORD: e2a
          POSTGRES_DB: e2a_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U e2a -d e2a_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 15
      # The e2e suite exercises outbound send/reply, which the relay routes to an
      # upstream SMTP host. Mailpit (the same catch-all used in local dev via
      # docker-compose) stands in for SES; the tests point WithOutboundSMTP at
      # 127.0.0.1:1025.
      mailpit:
        image: axllent/mailpit:v1.30.0
        ports:
          - 1025:1025
          - 8025:8025
        options: >-
          --health-cmd "wget --quiet --spider http://localhost:8025/api/v1/info || exit 1"
          --health-interval 5s
          --health-timeout 2s
          --health-retries 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true
      # The internal/e2e suite (build tag `integration`) boots the real relay +
      # HTTP API against the test DB and drives them over SMTP/HTTP. It is NOT
      # run by `go test ./...` (no build tag) or `make cover` (no build tag) —
      # this job is its only CI gate.
      - name: Run e2e suite
        run: make test-e2e

  web:
    name: Web tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm install
      - run: npm run lint
      - run: npm test
      - run: npm run build

  ts-sdk:
    name: TypeScript SDK tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm install --package-lock=false
      - run: npm run build --workspace @e2a/sdk
      - run: npm test --workspace @e2a/sdk

  ts-contract:
    name: TypeScript SDK contract tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: e2a
          POSTGRES_PASSWORD: e2a
          POSTGRES_DB: e2a_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U e2a -d e2a_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm install --package-lock=false
      - name: Build contract server helper
        run: |
          cd "$GITHUB_WORKSPACE"
          go build -o /tmp/e2a-contract-server ./cmd/e2a-contract-server
      - name: Run contract tests against shared test server
        run: |
          set -euo pipefail
          envfile="$(mktemp)"
          logfile="$(mktemp)"
          cleanup() {
            if [ -n "${server_pid:-}" ]; then
              kill "${server_pid}" >/dev/null 2>&1 || true
              wait "${server_pid}" >/dev/null 2>&1 || true
            fi
          }
          trap 'status=$?; if [ $status -ne 0 ]; then echo "=== contract server log ==="; cat "$logfile"; fi; cleanup; exit $status' EXIT

          cd "$GITHUB_WORKSPACE"
          E2A_TEST_DATABASE_URL="postgres://e2a:e2a@127.0.0.1:5433/e2a_test?sslmode=disable" \
            /tmp/e2a-contract-server -env-file "$envfile" >"$logfile" 2>&1 &
          server_pid=$!

          for _ in $(seq 1 150); do
            if [ -s "$envfile" ]; then
              break
            fi
            if ! kill -0 "$server_pid" >/dev/null 2>&1; then
              break
            fi
            sleep 0.2
          done

          test -s "$envfile"
          set -a
          . "$envfile"
          set +a

          for _ in $(seq 1 20); do
            if curl -fsS "$E2A_TEST_BASE_URL/api/health" >/dev/null; then
              break
            fi
            sleep 0.2
          done

          cd "$GITHUB_WORKSPACE"
          npm run test:contract --workspace @e2a/sdk

  cli:
    name: CLI tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm install --package-lock=false
      - run: npm run build --workspace @e2a/sdk
      - run: npm test --workspace @e2a/cli
      - run: npm run build --workspace @e2a/cli

  deps-sync:
    # Guardrail: in-repo consumers (mcp, cli) must declare an @e2a/sdk range the
    # workspace SDK satisfies, or npm links a STALE published SDK instead of the
    # workspace (the bug that shipped dnsRecords: {} over MCP after the SDK
    # majored to 4.0.0). Fails the moment the SDK majors without consumers bumping.
    name: Internal SDK version sync
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: node scripts/check-sdk-version-sync.mjs

  plugin:
    # Guardrail: the agent plugin (plugins/e2a) + its Claude/Codex/Cursor
    # marketplace manifests must parse, keep one version across every manifest,
    # and ship skills whose SKILL.md frontmatter satisfies Claude Code's loader
    # constraints. A malformed manifest/skill otherwise fails silently at
    # install time with no build error.
    name: Plugin manifests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: node scripts/validate-plugin.mjs

  mcp:
    name: MCP server tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm install --package-lock=false
      - run: npm run build --workspace @e2a/sdk
      - run: npm test --workspace @e2a/mcp-server
      - run: npm run build --workspace @e2a/mcp-server

  spec:
    name: OpenAPI spec freshness
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true
      # The /v1 OpenAPI document is emitted from the live Huma handlers and
      # committed at api/openapi.yaml; this gate fails if it drifts (run
      # `make spec` to regenerate). This replaces the legacy swag-annotation
      # freshness check: the swag pipeline (web/public/openapi.yaml + the SDK
      # codegen that consumes it) is being retired with the SDK /v1 port, so
      # web/public/openapi.yaml is frozen and no longer swag-freshness-checked
      # until that follow-up PR flips codegen onto api/openapi.yaml.
      - name: Check the /v1 spec is up to date
        run: make spec-check

  python-sdk:
    name: Python SDK tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: sdks/python
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            sdks/python/pyproject.toml
      - run: pip install -e ".[dev]"
      - run: mypy
      - run: pytest tests/ -v

  python-contract:
    name: Python SDK contract tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: e2a
          POSTGRES_PASSWORD: e2a
          POSTGRES_DB: e2a_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U e2a -d e2a_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 15
    defaults:
      run:
        working-directory: sdks/python
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            sdks/python/pyproject.toml
      - run: pip install -e ".[dev]"
      - name: Build contract server helper
        run: |
          cd "$GITHUB_WORKSPACE"
          go build -o /tmp/e2a-contract-server ./cmd/e2a-contract-server
      - name: Run contract tests against shared test server
        run: |
          set -euo pipefail
          envfile="$(mktemp)"
          logfile="$(mktemp)"
          cleanup() {
            if [ -n "${server_pid:-}" ]; then
              kill "${server_pid}" >/dev/null 2>&1 || true
              wait "${server_pid}" >/dev/null 2>&1 || true
            fi
          }
          trap 'status=$?; if [ $status -ne 0 ]; then echo "=== contract server log ==="; cat "$logfile"; fi; cleanup; exit $status' EXIT

          cd "$GITHUB_WORKSPACE"
          E2A_TEST_DATABASE_URL="postgres://e2a:e2a@127.0.0.1:5433/e2a_test?sslmode=disable" \
            /tmp/e2a-contract-server -env-file "$envfile" >"$logfile" 2>&1 &
          server_pid=$!

          for _ in $(seq 1 150); do
            if [ -s "$envfile" ]; then
              break
            fi
            if ! kill -0 "$server_pid" >/dev/null 2>&1; then
              break
            fi
            sleep 0.2
          done

          test -s "$envfile"
          set -a
          . "$envfile"
          set +a

          for _ in $(seq 1 20); do
            if curl -fsS "$E2A_TEST_BASE_URL/api/health" >/dev/null; then
              break
            fi
            sleep 0.2
          done

          cd "$GITHUB_WORKSPACE/sdks/python"
          pytest tests/test_contract.py -v

  generated-code:
    name: Generated code freshness
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            sdks/python/pyproject.toml
      - name: Install TS SDK dependencies
        run: npm install --package-lock=false
      - name: Check generated code is up to date
        run: make generate-sdk-check

  design-system-dist:
    name: Design system dist freshness
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      # @e2a/ui's dist/ is committed (web consumes it via a file: dep and its
      # Docker image copies it). Rebuild and fail on drift, same idiom as the
      # OpenAPI/SDK freshness gates above.
      - name: Install workspace deps
        run: npm install --package-lock=false
      - name: Rebuild @e2a/ui
        run: npm run build --workspace @e2a/ui
      - name: Check dist/ is up to date
        run: git diff --exit-code design-system/dist
