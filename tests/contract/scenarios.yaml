# Shared behavioral contract scenarios for the /v1 public API.
#
# The typed Huma /v1 surface (internal/httpapi) is the source of truth. A few
# endpoints have not been ported off the legacy gorilla/mux surface yet and
# are still served at /api/v1 via the chi root's legacy fallback; those are
# called out inline where they appear (account-wide HITL queue at
# /api/v1/pending, flat outbound detail at /api/v1/messages/{id}, signing
# secrets under /api/v1/users/me/signing-secrets).
#
# Each scenario is a sequence of steps executed against a live test server.
# The Go runner (contract_test.go) consumes this file directly. TypeScript
# and Python SDK runners will consume the same file in later phases, so the
# format must remain language-agnostic.
#
# Setup helpers:
#   register_domain — claim a domain directly in the store
#   verify_domain   — mark a claimed domain verified in the store
#   register_agent  — create an agent through the public API
#   inject_message  — insert an inbound message directly in the store
#
# Step actions:
#   request          — make an HTTP request, assert status and optional body fields
#   inject_message   — insert an inbound message directly in the store
#   ws_connect       — open a WebSocket connection
#   ws_reconnect     — reconnect a WebSocket connection to trigger drain-on-reconnect
#   ws_read          — read and assert one WebSocket notification
#   verify_and_retry — verify a domain in the store, then replay an HTTP request
#
# Placeholder tokens (resolved by runner at execution time):
#   {base_url}      — test server URL
#   {api_key}       — valid API key for the test user
#   {agent_email}   — agent email created by a prior register_agent setup step
#   {injected_message_id} — message ID created by a prior inject_message step

scenarios:

  - name: agent_crud
    description: Register, list, get (verify no leaked fields), delete agent
    setup:
      - register_domain: crud.test.dev
      - verify_domain: crud.test.dev
    steps:
      - id: register
        action: request
        method: POST
        path: /v1/agents
        body:
          email: bot@crud.test.dev
          agent_mode: local
        expect:
          status: 201
          body_contains:
            - id
            - email
          body_match:
            email: bot@crud.test.dev

      - id: list
        action: request
        method: GET
        path: /v1/agents
        expect:
          status: 200
          body_contains:
            - agents
          body_match:
            "agents[0].email": bot@crud.test.dev
            "agents[0].agent_mode": local

      - id: get
        action: request
        method: GET
        path: /v1/agents/bot@crud.test.dev
        expect:
          status: 200
          body_contains:
            - id
            - email
            - agent_mode
          body_excludes:
            - user_id
            - public

      - id: delete
        action: request
        method: DELETE
        path: /v1/agents/bot@crud.test.dev
        # /v1 deleteAgent returns 200 with {"status":"deleted"} (non-empty
        # body, so Huma's default success status is 200, not 204).
        expect:
          status: 200

      - id: list_after_delete
        action: request
        method: GET
        path: /v1/agents
        expect:
          status: 200
          body_match:
            "agents.length": 0

  - name: domain_crud
    description: Register, list, verify, delete domain with typed responses
    steps:
      - id: register
        action: request
        method: POST
        path: /v1/domains
        body:
          domain: domain-crud.test.dev
        expect:
          status: 201
          body_contains:
            - domain
            - verified
            - verification_token
            - dns_records
          body_match:
            domain: domain-crud.test.dev
            verified: false
            "dns_records.mx.host": "@"
            "dns_records.mx.priority": 10
            "dns_records.txt.host": "@"

      - id: list
        action: request
        method: GET
        path: /v1/domains
        expect:
          status: 200
          body_match:
            "domains.length": 1

      - id: verify
        action: request
        method: POST
        path: /v1/domains/domain-crud.test.dev/verify
        # In the dev/test harness (Production=false) the DNS probe short-
        # circuits TXTFound=true, so /v1 marks the domain verified and
        # returns 200 + verified=true.
        expect:
          status: 200
          body_match:
            verified: true

      - id: delete
        action: request
        method: DELETE
        path: /v1/domains/domain-crud.test.dev
        # /v1 deleteDomain declares DefaultStatus 204 (empty body).
        expect:
          status: 204

  - name: read_state_transition
    description: GET /messages/{id} marks unread messages as read
    setup:
      - register_domain: readstate.test.dev
      - verify_domain: readstate.test.dev
      - register_agent:
          email: bot@readstate.test.dev
          agent_mode: local
      - inject_message:
          agent_email: "{agent_email}"
          from: alice@example.com
          subject: Test read state
    steps:
      - id: list_unread
        action: request
        method: GET
        path: /v1/agents/{agent_email}/messages?status=unread
        # /v1 listMessages returns the standardized cursor page
        # {"items":[...],"next_cursor":...} (not the legacy {"messages":[...]}).
        expect:
          status: 200
          body_match:
            "items.length": 1
            "items[0].status": unread

      - id: get_detail
        action: request
        method: GET
        path: /v1/agents/{agent_email}/messages/{injected_message_id}
        expect:
          status: 200
          body_contains:
            - message_id
            - auth_headers
            - raw_message

      - id: list_unread_after
        action: request
        method: GET
        path: /v1/agents/{agent_email}/messages?status=unread
        expect:
          status: 200
          body_match:
            "items.length": 0

      - id: list_read
        action: request
        method: GET
        path: /v1/agents/{agent_email}/messages?status=read
        expect:
          status: 200
          body_match:
            "items.length": 1
            "items[0].status": read

  - name: placeholder_resolution
    description: Placeholders resolve in request bodies and expected values
    setup:
      - register_domain: placeholder.test.dev
      - verify_domain: placeholder.test.dev
      - register_agent:
          email: bot@placeholder.test.dev
          agent_mode: local
    steps:
      - id: duplicate_register_with_placeholder
        action: request
        method: POST
        path: /v1/agents
        body:
          email: "{agent_email}"
          agent_mode: local
        expect:
          status: 409

      - id: list_agents_matches_placeholder
        action: request
        method: GET
        path: /v1/agents
        expect:
          status: 200
          body_match:
            "agents[0].email": "{agent_email}"

  - name: auth_rejection
    description: Missing or invalid API keys get 401 across all endpoints
    auth_override: none
    steps:
      - id: no_auth_list_agents
        action: request
        method: GET
        path: /v1/agents
        # /v1 errors use the envelope {"error":{"code","message","request_id"}};
        # an unauthenticated call carries code=unauthorized.
        expect:
          status: 401
          body_match:
            "error.code": unauthorized

      - id: no_auth_create_agent
        action: request
        method: POST
        path: /v1/agents
        body: {}
        expect:
          status: 401
          body_match:
            "error.code": unauthorized

      - id: no_auth_list_domains
        action: request
        method: GET
        path: /v1/domains
        expect:
          status: 401
          body_match:
            "error.code": unauthorized

      - id: no_auth_send
        action: request
        method: POST
        path: /v1/send
        body: {}
        expect:
          status: 401
          body_match:
            "error.code": unauthorized

  - name: auth_rejection_invalid_key
    description: Invalid API key gets 401 across all endpoints
    auth_override: "Bearer e2a_invalid_key_12345"
    steps:
      - id: invalid_key_list_agents
        action: request
        method: GET
        path: /v1/agents
        expect:
          status: 401
          body_match:
            "error.code": unauthorized

      - id: invalid_key_create_agent
        action: request
        method: POST
        path: /v1/agents
        body: {}
        expect:
          status: 401
          body_match:
            "error.code": unauthorized

      - id: invalid_key_list_domains
        action: request
        method: GET
        path: /v1/domains
        expect:
          status: 401
          body_match:
            "error.code": unauthorized

      - id: invalid_key_send
        action: request
        method: POST
        path: /v1/send
        body: {}
        expect:
          status: 401
          body_match:
            "error.code": unauthorized

  - name: domain_verification_enforced
    description: Agent registration blocked on unverified domain
    setup:
      - register_domain: unverified.test.dev
    steps:
      - id: register_on_unverified
        action: request
        method: POST
        path: /v1/agents
        body:
          email: bot@unverified.test.dev
          agent_mode: local
        # /v1 createAgent rejects an unverified (but claimed) domain with a
        # 400 envelope carrying code=domain_not_verified.
        expect:
          status: 400
          body_match:
            "error.code": domain_not_verified

      - id: verify_then_register
        action: verify_and_retry
        verify_domain: unverified.test.dev
        method: POST
        path: /v1/agents
        body:
          email: bot@unverified.test.dev
          agent_mode: local
        expect:
          status: 201

  - name: ws_notification_shape
    description: >
      WebSocket drain-on-reconnect delivers notifications matching the
      documented shape. Notification-only protocol: server sends
      notifications, client never sends application frames.
    setup:
      - register_domain: ws.test.dev
      - verify_domain: ws.test.dev
      - register_agent:
          email: bot@ws.test.dev
          agent_mode: local
    steps:
      - id: connect
        action: ws_connect
        path: /v1/agents/{agent_email}/ws

      - id: inject
        action: inject_message
        agent_email: "{agent_email}"
        from: alice@example.com
        subject: WS test

      - id: reconnect
        action: ws_reconnect
        path: /v1/agents/{agent_email}/ws

      - id: read_notification
        action: ws_read
        expect:
          fields_present:
            - message_id
            - from
            - recipient
            - subject
            - received_at
          fields_absent:
            - body
            - raw_message
            - to
            - cc
          field_match:
            from: alice@example.com
            recipient: "{agent_email}"
            subject: WS test

  - name: health_check
    description: Health endpoint is available without auth
    steps:
      - id: health
        action: request
        method: GET
        path: /api/health
        auth_override: none
        expect:
          status: 200

  - name: hitl_send_holds_202
    description: >
      With HITL enabled on the agent, POST /send returns 202 +
      status=pending_approval + approval_expires_at, and the message
      surfaces on GET /messages?status=pending_approval.
    setup:
      - register_domain: hitl-hold.test.dev
      - verify_domain: hitl-hold.test.dev
      - register_agent:
          email: bot@hitl-hold.test.dev
          agent_mode: local
    steps:
      - id: enable_hitl
        # /v1 agent updates use PATCH (the legacy PUT was dropped).
        action: request
        method: PATCH
        path: /v1/agents/{agent_email}
        body:
          hitl_enabled: true
        expect:
          status: 200
          body_match:
            hitl_enabled: true

      - id: send_held
        action: request
        method: POST
        path: /v1/send
        body:
          from: "{agent_email}"
          to:
            - alice@example.com
          subject: Hold me
          body: please review before sending
        expect:
          status: 202
          body_contains:
            - status
            - message_id
            - approval_expires_at
          body_match:
            status: pending_approval

      - id: list_pending
        # The account-wide HITL queue is NOT yet ported to /v1; it is still
        # served by the legacy fallback at /api/v1/pending and returns the
        # legacy {"messages":[...]} envelope (items keyed by `id`, with
        # `direction`/`status`/`subject`).
        action: request
        method: GET
        path: /api/v1/pending?status=pending_approval
        expect:
          status: 200
          body_match:
            "messages.length": 1
            "messages[0].status": pending_approval
            "messages[0].direction": outbound
            "messages[0].subject": Hold me

  - name: hitl_reject_records_reason
    description: >
      Reject endpoint accepts a reason in the body and the detail GET
      surfaces it. Catches the chunked-body regression (rejection
      reason was silently dropped when ContentLength was unknown).
    setup:
      - register_domain: hitl-reject.test.dev
      - verify_domain: hitl-reject.test.dev
      - register_agent:
          email: bot@hitl-reject.test.dev
          agent_mode: local
    steps:
      - id: enable_hitl
        action: request
        method: PATCH
        path: /v1/agents/{agent_email}
        body:
          hitl_enabled: true
        expect:
          status: 200

      - id: send_held
        action: request
        method: POST
        path: /v1/send
        body:
          from: "{agent_email}"
          to:
            - alice@example.com
          subject: To be rejected
          body: this should never go out
        expect:
          status: 202
          body_contains:
            - message_id
        capture:
          held_id: message_id

      - id: reject
        # The flat /api/v1/messages/{id}/reject route was dropped; reject is
        # now the per-agent /v1 operation. RejectResultView surfaces
        # {status, message_id, rejection_reason}.
        action: request
        method: POST
        path: /v1/agents/{agent_email}/messages/{held_id}/reject
        body:
          reason: off-topic for this audience
        expect:
          status: 200
          body_match:
            status: rejected
            rejection_reason: off-topic for this audience

      - id: detail_round_trip
        # Flat outbound-message detail is NOT yet ported to /v1; still served
        # by the legacy fallback at /api/v1/messages/{id}. Confirms the
        # rejection reason persisted (the chunked-body regression guard).
        action: request
        method: GET
        path: /api/v1/messages/{held_id}
        expect:
          status: 200
          body_match:
            status: rejected
            rejection_reason: off-topic for this audience

  - name: messages_direction_all_shape
    description: >
      GET /agents/{email}/messages?direction=all returns the dashboard-
      inbox shape: every row carries `direction`, outbound rows carry
      `hitl_status` and `webhook_status`. Catches the H1 SDK contract
      drift if api_docs.MessageSummary falls out of sync with the
      handler again.
    setup:
      - register_domain: mixed.test.dev
      - verify_domain: mixed.test.dev
      - register_agent:
          email: bot@mixed.test.dev
          agent_mode: local
      - inject_message:
          agent_email: "{agent_email}"
          from: external@example.com
          subject: an inbound row
    steps:
      - id: enable_hitl
        action: request
        method: PATCH
        path: /v1/agents/{agent_email}
        body:
          hitl_enabled: true
        expect:
          status: 200

      - id: outbound_held
        action: request
        method: POST
        path: /v1/send
        body:
          from: "{agent_email}"
          to:
            - someone@example.com
          subject: an outbound row
          body: pending
        expect:
          status: 202

      - id: list_mixed
        # /v1 listMessages: cursor page envelope ({"items":[...]}), page-size
        # param is `limit` (not legacy `page_size`). MessageSummaryView keeps
        # the per-row `direction`; outbound rows carry `hitl_status`.
        action: request
        method: GET
        path: /v1/agents/{agent_email}/messages?direction=all&limit=10
        expect:
          status: 200
          body_contains:
            - items
          # Two rows — the order is most-recent-first so the outbound
          # held row lands at index 0.
          body_match:
            "items.length": 2
            "items[0].direction": outbound
            "items[0].hitl_status": pending_approval
            "items[1].direction": inbound

  - name: signing_secrets_crud_cap
    description: >
      Per-user webhook signing secrets cap at 5 (including the
      "default" one auto-created at user signup; see
      EnsureUserHasSigningSecret). Creating beyond cap 400s. List
      returns the full plaintext for every row — deliberate posture,
      see SigningSecretSummary docstring.
    setup:
      - register_domain: signing.test.dev
      - verify_domain: signing.test.dev
    steps:
      - id: create_1
        action: request
        method: POST
        path: /api/v1/users/me/signing-secrets
        body:
          name: first
        expect:
          status: 201
          body_contains:
            - id
            - name
            - secret
            - secret_prefix

      - id: create_2
        action: request
        method: POST
        path: /api/v1/users/me/signing-secrets
        body:
          name: second
        expect:
          status: 201

      - id: create_3
        action: request
        method: POST
        path: /api/v1/users/me/signing-secrets
        body:
          name: third
        expect:
          status: 201

      - id: create_4_reaches_cap
        action: request
        method: POST
        path: /api/v1/users/me/signing-secrets
        body:
          name: fourth
        expect:
          status: 201

      - id: create_5_fails_cap
        # User already has 1 default + 4 created = 5 (cap). 6th creation
        # must 400 with the documented cap error.
        action: request
        method: POST
        path: /api/v1/users/me/signing-secrets
        body:
          name: would-be-fifth
        expect:
          status: 400

      - id: list_returns_plaintext
        action: request
        method: GET
        path: /api/v1/users/me/signing-secrets
        expect:
          status: 200
          body_contains:
            - secrets
          # The plaintext `secret` field IS in the list response by
          # design (different posture from API keys). The `create_1`
          # step above already validates that the create call returns
          # `secret` + `secret_prefix`; this assertion locks down the
          # count so a future "redact on list" change would have to
          # break the contract test.
          body_match:
            "secrets.length": 5

  - name: info_unauthenticated_shape
    description: >
      GET /v1/info is the deployment-discovery endpoint — works
      without auth and surfaces shared_domain / slug_registration_enabled
      / public_url. Catches drift in the DeploymentInfoView struct.
    auth_override: none
    steps:
      - id: info
        action: request
        method: GET
        path: /v1/info
        expect:
          status: 200
          body_contains:
            - shared_domain
            - slug_registration_enabled

  - name: pending_messages_status_filter_strict
    description: >
      The account-wide HITL queue (legacy fallback at /api/v1/pending,
      not yet ported to /v1) only accepts status=pending_approval. Any
      other status value (or "all") returns 400. Pins the documented
      behavior so the "filterable by status" claim is either fixed or the
      handler is broadened.
    setup:
      - register_domain: pstatus.test.dev
      - verify_domain: pstatus.test.dev
    steps:
      - id: default_is_pending
        action: request
        method: GET
        path: /api/v1/pending
        expect:
          status: 200

      - id: explicit_pending_ok
        action: request
        method: GET
        path: /api/v1/pending?status=pending_approval
        expect:
          status: 200

      - id: sent_filter_rejected
        action: request
        method: GET
        path: /api/v1/pending?status=sent
        expect:
          status: 400

      - id: all_filter_rejected
        action: request
        method: GET
        path: /api/v1/pending?status=all
        expect:
          status: 400

  - name: ws_auth_rejection
    description: WebSocket endpoint rejects missing or invalid query-param tokens
    setup:
      - register_domain: wsauth.test.dev
      - verify_domain: wsauth.test.dev
      - register_agent:
          email: bot@wsauth.test.dev
          agent_mode: local
    steps:
      - id: no_token
        action: request
        method: GET
        path: /v1/agents/bot@wsauth.test.dev/ws
        expect:
          status: 401

      - id: invalid_token
        action: request
        method: GET
        path: /v1/agents/bot@wsauth.test.dev/ws?token=invalid_key_12345
        expect:
          status: 401
